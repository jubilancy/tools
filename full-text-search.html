<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Full-Text Search | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 20px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    .result { border: 1px solid var(--puny); padding: 10px; margin-bottom: 8px; }
    .result:hover { background: var(--hover); border-color: var(--text); }
    .result-title { font-weight: bold; margin-bottom: 4px; }
    .result-body { font-size: 0.85rem; color: var(--puny); }
    mark { background: var(--highlight); color: var(--text); }
    #score { font-size: 0.75rem; color: var(--puny); float: right; }
    #doc-count { font-size: 0.8rem; color: var(--puny); }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>Full-Text Search</h1>
    <p class="puny">Add documents, then search them instantly in the browser using Lunr.js. No server needed.</p>
    <div class="tool-layout">
      <div>
        <label>Add document</label>
        <input type="text" id="doc-title" placeholder="Title" style="margin-bottom:8px" />
        <textarea id="doc-body" rows="4" placeholder="Paste document body here…"></textarea>
        <div class="action-bar">
          <button onclick="addDoc()">Add document</button>
          <button onclick="loadSample()">Load sample docs</button>
          <button onclick="clearDocs()">Clear all</button>
        </div>
        <div id="doc-count"></div>
      </div>
      <div>
        <label>Search</label>
        <input type="text" id="search-input" placeholder="Type to search…" oninput="doSearch()" />
      </div>
      <div id="results"></div>
    </div>
  </main>
  <footer style="margin-top: 4rem; text-align: center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = html.getAttribute('data-theme'); const next = now === 'dark' ? 'light' : 'dark'; html.setAttribute('data-theme', next); localStorage.setItem('theme', next); toggle.innerText = next === 'dark' ? '[light]' : '[dark]'; };

    let docs = [];
    let idx = null;

    function buildIndex() {
      idx = lunr(function() {
        this.ref('id');
        this.field('title', { boost: 10 });
        this.field('body');
        docs.forEach(d => this.add(d));
      });
    }

    function addDoc() {
      const title = document.getElementById('doc-title').value.trim();
      const body = document.getElementById('doc-body').value.trim();
      if (!title && !body) return;
      docs.push({ id: docs.length, title: title || '(untitled)', body });
      document.getElementById('doc-title').value = '';
      document.getElementById('doc-body').value = '';
      buildIndex();
      updateCount();
    }

    function loadSample() {
      docs = [
        { id: 0, title: 'Markdown tips', body: 'Use # for headings, ** for bold, _ for italic. Links are [text](url).' },
        { id: 1, title: 'Git basics', body: 'git init, git add ., git commit -m "msg", git push origin main.' },
        { id: 2, title: 'CSS variables', body: 'Define with --name: value in :root, use with var(--name). Great for theming.' },
        { id: 3, title: 'Fetch API', body: 'fetch(url).then(r => r.json()).then(data => ...) — native browser HTTP requests.' },
        { id: 4, title: 'Flexbox guide', body: 'display:flex; justify-content; align-items; flex-wrap; gap — core flex properties.' },
      ];
      buildIndex();
      updateCount();
    }

    function clearDocs() {
      docs = []; idx = null;
      document.getElementById('results').innerHTML = '';
      updateCount();
    }

    function updateCount() {
      document.getElementById('doc-count').textContent = `${docs.length} document${docs.length !== 1 ? 's' : ''} indexed`;
    }

    function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      const container = document.getElementById('results');
      if (!q || !idx) { container.innerHTML = ''; return; }
      let results;
      try { results = idx.search(q + '~1'); } catch(e) { results = []; }
      if (!results.length) { container.innerHTML = '<p class="puny">No results.</p>'; return; }
      container.innerHTML = results.map(r => {
        const doc = docs[r.ref];
        return `<div class="result"><div class="result-title">${doc.title} <span id="score">${r.score.toFixed(3)}</span></div><div class="result-body">${doc.body.slice(0, 150)}…</div></div>`;
      }).join('');
    }
  </script>
</body>
</html>
