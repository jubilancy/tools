<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL List Cleaner | tools.eliana.lol</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="global.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Prevent Bootstrap from ruining your dark mode background */
        body.dark {
            background-color: #020617 !important;
            color: #f8fafc !important;
        }

        .card {
            background-color: rgba(30, 41, 59, 0.5) !important;
            border-color: #334155 !important;
            color: inherit !important;
        }

        .form-control {
            background-color: #0f172a !important;
            border-color: #334155 !important;
            color: #f8fafc !important;
        }

        #commands .cleaner-btn {
            margin: 0 0 .6em .6em;
        }

        .navbar {
            display: none !important;
        }

        /* Hide the old embedded nav if it peaks through */
    </style>
</head>

<body class="bg-white dark:bg-slate-950 min-h-screen text-slate-900 dark:text-slate-100 flex flex-col">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent">
                tools.eliana.lol
            </a>
            <div class="flex items-center gap-6">
                <ul class="hidden md:flex space-x-6 text-sm font-medium">
                    <li><a href="index.html" class="hover:text-blue-500">Home</a></li>
                    <li><a href="rss-page.html" class="hover:text-blue-500">RSS</a></li>
                    <li><a href="url-list-cleaner.html" class="text-blue-500">URL Cleaner</a></li>
                </ul>
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800">🌙</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-5xl mx-auto px-6 py-12">
        <div class="mb-6">
            <h1 class="text-3xl font-extrabold">URL List Cleaner</h1>
            <p class="text-slate-500">Remove duplicates, sort domains, and clean up URL lists.</p>
        </div>

        <div class="card shadow-xl rounded-2xl overflow-hidden">
            <div class="card-body p-4">
                <form>
                    <div class="form-group">
                        <label class="mb-2 font-semibold">Enter your URLs to Clean</label>
                        <textarea placeholder="Enter one URL per line..." class="form-control mb-3" rows="10" id="linklist"></textarea>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <label id="linecount" class="text-sm text-slate-500">0 lines</label>
                            <div class="btn-group">
                                <button type="button" id="undochange" class="btn btn-sm btn-outline-secondary"><i class="fa fa-rotate-left"></i> Undo</button>
                                <button type="button" id="singlecopy" class="btn btn-sm btn-primary"><i class="fa fa-clipboard"></i> Copy</button>
                                <button type="reset" class="btn btn-sm btn-outline-danger"><i class="fa-regular fa-file"></i> Clear</button>
                            </div>
                        </div>
                    </div>

                    <div id="commands" class="row g-2">
                        <div class="col-12">
                            <button type="button" id="parseUrl" class="cleaner-btn btn btn-primary">Extract URLs</button>
                            <button type="button" id="addhttp" class="cleaner-btn btn btn-primary">Add https://www.</button>
                            <button type="button" id="rtdomain" class="cleaner-btn btn btn-outline-primary">Root Domain</button>
                            <button type="button" id="madomain" class="cleaner-btn btn btn-outline-primary">Main Domain</button>
                            <button type="button" id="root" class="cleaner-btn btn btn-outline-primary">Trim to Root</button>
                        </div>
                        <div class="col-12 mt-2">
                            <button type="button" id="urls" class="cleaner-btn btn btn-success">Remove Duplicate URLs</button>
                            <button type="button" id="domains" class="cleaner-btn btn btn-success">Remove Duplicate Domains</button>
                            <button type="button" id="removehttp" class="cleaner-btn btn btn-warning">Remove https Variations</button>
                        </div>
                        <div class="col-12 mt-2 border-top pt-3">
                            <button type="button" id="httpsort" class="cleaner-btn btn btn-secondary">Sort Alphabetically</button>
                            <button type="button" id="sort_length" class="cleaner-btn btn btn-secondary">Sort by Length</button>
                            <button type="button" id="sort_random" class="cleaner-btn btn btn-secondary">Sort Random</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-200 dark:border-slate-800 py-8 text-center text-slate-500 text-xs">
        &copy; 2026 eliana.lol
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

    <script src="https://www.coderstool.com/js/all.js"></script>
    <script src="https://www.coderstool.com/js/c_url.js"></script>

    <script>
        // Initialize the Tool Logic
        $(document).ready(function() {
            if (window.CodersTool) {
                CodersTool.url_link_clean();
            }
        });

        // Shared Theme Toggle Logic
        const toggle = document.getElementById('theme-toggle');
        const initTheme = () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                toggle.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                toggle.textContent = '🌙';
            }
        };
        initTheme();
        toggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            toggle.textContent = isDark ? '☀️' : '🌙';
        });
    </script>
</body>

</html>
