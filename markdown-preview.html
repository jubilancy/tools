<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markdown Preview | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 20px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
    #preview { border: 1px solid var(--puny); padding: 16px; min-height: 300px; font-family: sans-serif; line-height: 1.6; overflow-y: auto; }
    #preview h1,#preview h2,#preview h3 { font-family: sans-serif; margin-top: 1rem; }
    #preview code { background: var(--hover); padding: 2px 5px; font-family: monospace; font-size: 0.85rem; }
    #preview pre { background: var(--hover); padding: 10px; overflow-x: auto; }
    #preview pre code { background: none; padding: 0; }
    #preview blockquote { border-left: 3px solid var(--accent); margin-left: 0; padding-left: 12px; color: var(--puny); }
    #preview a { color: var(--accent); }
    #preview table { border-collapse: collapse; width: 100%; }
    #preview th, #preview td { border: 1px solid var(--puny); padding: 6px 10px; }
    #preview th { background: var(--highlight); }
    #word-count { font-size: 0.8rem; color: var(--puny); }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>Markdown Preview</h1>
    <p class="puny">Live markdown editor with preview. Export to HTML.</p>
    <div class="tool-layout">
      <div class="action-bar">
        <button onclick="loadSample()">Sample</button>
        <button onclick="copyHTML()">Copy HTML</button>
        <button onclick="downloadHTML()">Download HTML</button>
        <button onclick="clearAll()">Clear</button>
        <span id="word-count"></span>
      </div>
      <div class="two-col">
        <div>
          <label>Markdown</label>
          <textarea id="md-input" rows="20" oninput="render()" placeholder="# Hello world&#10;&#10;Type some **markdown** here…"></textarea>
        </div>
        <div>
          <label>Preview</label>
          <div id="preview"></div>
        </div>
      </div>
    </div>
  </main>
  <footer style="margin-top:4rem;text-align:center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = htmlEl.getAttribute('data-theme'); const next = now==='dark'?'light':'dark'; htmlEl.setAttribute('data-theme',next); localStorage.setItem('theme',next); toggle.innerText=next==='dark'?'[light]':'[dark]'; };

    marked.setOptions({ breaks: true, gfm: true });

    function render() {
      const src = document.getElementById('md-input').value;
      document.getElementById('preview').innerHTML = marked.parse(src);
      const words = src.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('word-count').textContent = `${words} words · ${src.length} chars`;
    }

    function loadSample() {
      document.getElementById('md-input').value = `# Hello, world\n\nThis is **bold**, this is *italic*, and this is \`inline code\`.\n\n## Lists\n\n- Item one\n- Item two\n- Item three\n\n## Code block\n\n\`\`\`js\nconst greet = name => \`Hello, \${name}!\`;\nconsole.log(greet('eliana'));\n\`\`\`\n\n## Table\n\n| Name | Value |\n|------|-------|\n| alpha | 1 |\n| beta | 2 |\n\n> A blockquote for good measure.`;
      render();
    }

    function copyHTML() { navigator.clipboard.writeText(document.getElementById('preview').innerHTML); }

    function downloadHTML() {
      const html = `<!doctype html><html><head><meta charset="utf-8"><style>body{font-family:sans-serif;max-width:700px;margin:2rem auto;line-height:1.6}code{background:#eee;padding:2px 5px}pre{background:#eee;padding:10px;overflow-x:auto}blockquote{border-left:3px solid #f60;padding-left:12px;color:#888}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:6px 10px}</style></head><body>${document.getElementById('preview').innerHTML}</body></html>`;
      const a = document.createElement('a'); a.href = 'data:text/html;charset=utf-8,'+encodeURIComponent(html); a.download = 'output.html'; a.click();
    }

    function clearAll() { document.getElementById('md-input').value=''; render(); }

    loadSample();
  </script>
</body>
</html>
