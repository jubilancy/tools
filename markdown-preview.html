<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markdown Preview | tools.eliana.lol</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" type="image/x-icon" href="favicon.svg" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <style>
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      align-items: start;
    }

    @media (max-width: 600px) {
      .split { grid-template-columns: 1fr; }
    }

    .pane {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .pane-label {
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
      color: var(--puny);
      border-bottom: 1px solid var(--puny);
      padding-bottom: 4px;
    }

    #md-input {
      width: 100%;
      min-height: 420px;
      font-family: monospace;
      font-size: 0.875rem;
      padding: 12px;
      border: 1px solid var(--puny);
      background: var(--bg);
      color: var(--text);
      box-sizing: border-box;
      resize: vertical;
      line-height: 1.6;
    }

    #md-input:focus { outline: none; border-color: var(--accent); }

    #preview {
      min-height: 420px;
      padding: 12px;
      border: 1px solid var(--puny);
      font-size: 0.9rem;
      line-height: 1.7;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    /* Markdown output styles */
    #preview h1, #preview h2, #preview h3 { margin: 1rem 0 0.5rem; font-size: inherit; text-transform: uppercase; }
    #preview h1 { font-size: 1.1rem; border-bottom: 1px solid var(--puny); padding-bottom: 4px; }
    #preview h2 { font-size: 1rem; }
    #preview h3 { font-size: 0.9rem; }
    #preview p { margin: 0.5rem 0; }
    #preview ul, #preview ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    #preview li { margin: 0.25rem 0; }
    #preview code { background: var(--highlight); padding: 1px 5px; font-family: monospace; font-size: 0.85rem; border: 1px solid var(--puny); }
    #preview pre { background: var(--highlight); padding: 1rem; overflow-x: auto; border-left: 3px solid var(--accent); margin: 0.75rem 0; }
    #preview pre code { background: none; border: none; padding: 0; }
    #preview blockquote { border-left: 3px solid var(--accent); margin: 0.75rem 0; padding: 0.25rem 1rem; color: var(--puny); }
    #preview a { color: var(--accent); }
    #preview table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; font-size: 0.85rem; }
    #preview th, #preview td { border: 1px solid var(--puny); padding: 6px 10px; text-align: left; }
    #preview th { background: var(--highlight); }
    #preview img { max-width: 100%; }
    #preview hr { border: none; border-top: 1px solid var(--puny); margin: 1rem 0; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    button {
      padding: 6px 12px;
      font-family: monospace;
      font-size: 0.85rem;
      border: 1px solid var(--text);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    button:hover { background: var(--hover); border-color: var(--accent); }
    button.primary { border-color: var(--accent); color: var(--accent); font-weight: bold; }

    .status { padding: 0.75rem 1rem; margin: 0.5rem 0; display: none; font-size: 0.9rem; border-left: 3px solid var(--accent); background: rgba(255,102,0,0.08); color: var(--accent); }
    .status.show { display: block; }

    .info-box { padding: 0.75rem 1rem; background-color: var(--highlight); border-left: 3px solid var(--accent); font-size: 0.875rem; margin-bottom: 0.5rem; }

    .stats { font-size: 0.75rem; color: var(--puny); }
  </style>
</head>
<body>
  <nav>
    <div class="left">
      <a href="index.html">home</a> | <a href="extra.html">extra</a> |
      <a href="credits.html">credits</a> |
      <a href="changelog.html">logs</a>
    </div>
    <div class="right">
      <button id="theme-toggle">[theme]</button> |
      <a href="https://eliana.lol">site</a>
    </div>
  </nav>

  <main>
    <h1>Markdown Preview</h1>
    <p class="puny">live markdown → html. write on the left, see the result on the right.</p>

    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div class="toolbar">
        <button onclick="insertMd('**bold**')"><b>B</b></button>
        <button onclick="insertMd('*italic*')"><i>I</i></button>
        <button onclick="insertMd('`code`')">` `</button>
        <button onclick="insertMd('\n```\n\n```')">block</button>
        <button onclick="insertMd('# ')">h1</button>
        <button onclick="insertMd('## ')">h2</button>
        <button onclick="insertMd('> ')">quote</button>
        <button onclick="insertMd('- ')">list</button>
        <button onclick="insertMd('[text](url)')">link</button>
        <button onclick="insertMd('---\n')">hr</button>
        <span style="flex:1"></span>
        <span class="stats" id="stats"></span>
        <button class="primary" onclick="copyHtml()">copy html</button>
        <button onclick="clearInput()">clear</button>
      </div>

      <div class="split">
        <div class="pane">
          <div class="pane-label">markdown</div>
          <textarea id="md-input" spellcheck="false" oninput="render()" placeholder="# Hello world

Start typing **markdown** here...

- item one
- item two

> A blockquote

\`\`\`js
const x = 42;
\`\`\`"></textarea>
        </div>
        <div class="pane">
          <div class="pane-label">preview</div>
          <div id="preview"></div>
        </div>
      </div>

      <div class="toolbar">
        <button onclick="loadExample()">load example</button>
        <button onclick="copyHtml()" class="primary">copy html output</button>
        <button onclick="downloadHtml()">download html</button>
        <button onclick="downloadMd()">download .md</button>
      </div>

      <div class="status" id="status"></div>
    </div>
  </main>

  <footer style="margin-top: 4rem; text-align: center" class="puny">
    © 2026 eliana.lol • <a href="credits.html">credits</a>
  </footer>

  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => {
      const next = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      htmlEl.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
    };
  </script>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    const input = document.getElementById('md-input');
    const preview = document.getElementById('preview');

    function render() {
      const md = input.value;
      preview.innerHTML = marked.parse(md);
      const words = md.trim() ? md.trim().split(/\s+/).length : 0;
      const chars = md.length;
      document.getElementById('stats').textContent = `${words} words · ${chars} chars`;
      localStorage.setItem('md-draft', md);
    }

    function insertMd(text) {
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const before = input.value.slice(0, start);
      const after = input.value.slice(end);
      input.value = before + text + after;
      input.selectionStart = input.selectionEnd = start + text.length;
      input.focus();
      render();
    }

    function clearInput() {
      input.value = '';
      render();
    }

    function copyHtml() {
      navigator.clipboard.writeText(preview.innerHTML);
      showStatus('html copied!');
    }

    function downloadHtml() {
      const blob = new Blob([`<!DOCTYPE html><html><head><meta charset="utf-8"><title>export</title></head><body>${preview.innerHTML}</body></html>`], { type: 'text/html' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'export.html'; a.click();
    }

    function downloadMd() {
      const blob = new Blob([input.value], { type: 'text/markdown' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'export.md'; a.click();
    }

    function loadExample() {
      input.value = `# Markdown Preview

Write markdown on the left, see **live HTML** on the right.

## Features

- *Italic* and **bold** text
- \`inline code\` and fenced blocks
- [Links](https://eliana.lol) and images
- Tables, blockquotes, and more

## Code Block

\`\`\`js
const greet = name => \`Hello, \${name}!\`;
console.log(greet('world'));
\`\`\`

## Table

| Library | Use |
|---------|-----|
| marked  | Markdown parsing |
| prism   | Syntax highlighting |

> Made with [marked.js](https://marked.js.org)
`;
      render();
    }

    function showStatus(msg) {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.classList.add('show');
      setTimeout(() => s.classList.remove('show'), 2000);
    }

    // Restore draft
    const draft = localStorage.getItem('md-draft');
    if (draft) { input.value = draft; render(); } else { loadExample(); }
  </script>
</body>
</html>
