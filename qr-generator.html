<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Generator | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 20px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    #qr-wrap { border: 1px solid var(--puny); padding: 20px; display: inline-block; background: #fff; }
    #qr-wrap canvas, #qr-wrap img { display: block; }
    .presets { display: flex; flex-wrap: wrap; gap: 8px; }
    .presets button { font-size: 0.75rem; padding: 3px 8px; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--puny); font-family: monospace; padding: 4px 8px; }
    input[type=color] { width: 40px; height: 28px; padding: 2px; border: 1px solid var(--puny); background: var(--bg); cursor: pointer; }
    input[type=range] { accent-color: var(--accent); }
    .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>QR Generator</h1>
    <p class="puny">Generate QR codes for URLs, text, email, WiFi, and more.</p>
    <div class="tool-layout">
      <div>
        <label>Presets</label>
        <div class="presets">
          <button onclick="setPreset('url')">URL</button>
          <button onclick="setPreset('email')">Email</button>
          <button onclick="setPreset('wifi')">WiFi</button>
          <button onclick="setPreset('tel')">Phone</button>
          <button onclick="setPreset('sms')">SMS</button>
        </div>
      </div>
      <div>
        <label>Content</label>
        <textarea id="qr-input" rows="4" oninput="debounce()" placeholder="https://eliana.lol"></textarea>
      </div>
      <div class="row">
        <div class="control-group">
          <label>Size <span id="size-label">200</span>px</label>
          <input type="range" id="qr-size" min="100" max="400" step="10" value="200" oninput="document.getElementById('size-label').textContent=this.value;debounce()" />
        </div>
        <div class="control-group">
          <label>Foreground</label>
          <input type="color" id="fg-color" value="#000000" oninput="debounce()" />
        </div>
        <div class="control-group">
          <label>Background</label>
          <input type="color" id="bg-color" value="#ffffff" oninput="debounce()" />
        </div>
        <div class="control-group">
          <label>Error correction</label>
          <select id="ec-level" onchange="debounce()"><option value="L">L (7%)</option><option value="M" selected>M (15%)</option><option value="Q">Q (25%)</option><option value="H">H (30%)</option></select>
        </div>
      </div>
      <div class="action-bar">
        <button onclick="downloadPNG()">Download PNG</button>
        <button onclick="downloadSVG()">Download SVG</button>
      </div>
      <div id="qr-wrap"><canvas id="qr-canvas"></canvas></div>
    </div>
  </main>
  <footer style="margin-top: 4rem; text-align: center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = htmlEl.getAttribute('data-theme'); const next = now === 'dark' ? 'light' : 'dark'; htmlEl.setAttribute('data-theme', next); localStorage.setItem('theme', next); toggle.innerText = next === 'dark' ? '[light]' : '[dark]'; };

    let qr = null;
    const presets = {
      url: 'https://eliana.lol',
      email: 'mailto:hello@example.com?subject=Hi',
      wifi: 'WIFI:T:WPA;S:NetworkName;P:Password;;',
      tel: 'tel:+15551234567',
      sms: 'smsto:+15551234567:Hello!'
    };

    function setPreset(key) { document.getElementById('qr-input').value = presets[key]; generate(); }

    function generate() {
      const text = document.getElementById('qr-input').value.trim() || 'https://eliana.lol';
      const size = parseInt(document.getElementById('qr-size').value);
      const fg = document.getElementById('fg-color').value;
      const bg = document.getElementById('bg-color').value;
      const ec = document.getElementById('ec-level').value;
      const wrap = document.getElementById('qr-wrap');
      wrap.innerHTML = '';
      qr = new QRCode(wrap, { text, width: size, height: size, colorDark: fg, colorLight: bg, correctLevel: QRCode.CorrectLevel[ec] });
    }

    let timer;
    function debounce() { clearTimeout(timer); timer = setTimeout(generate, 300); }

    function downloadPNG() {
      const img = document.querySelector('#qr-wrap img');
      if (!img) return;
      const a = document.createElement('a');
      a.href = img.src;
      a.download = 'qrcode.png';
      a.click();
    }

    function downloadSVG() {
      const canvas = document.querySelector('#qr-wrap canvas');
      if (!canvas) return downloadPNG();
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'qrcode.png';
      a.click();
    }

    generate();
  </script>
</body>
</html>
