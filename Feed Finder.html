<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Feed Finder | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .log-row { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; color: var(--puny); margin-bottom: 5px; }
        .log-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--puny); }
        .log-dot.done { background: var(--accent); }
        .feed-card { background: var(--hover); border: 1px solid var(--puny); padding: 15px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .feed-card-name { font-weight: bold; font-size: 0.9rem; }
        .feed-card-url { font-size: 0.7rem; color: var(--puny); }
    </style>
</head>
<body>
    <nav>
        <div class="left"><a href="index.html">home</a> | <a href="extra.html">extra</a> | <a href="credits.html">credits</a> | <a href="changelog.html">logs</a></div>
        <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
    </nav>
    <main>
        <h1>Feed Finder</h1>
        <p class="puny">Discover hidden RSS or Atom feeds from any URL.</p>
        <div style="display:flex; gap:10px; margin: 20px 0;">
            <input type="text" id="siteUrl" placeholder="example.com" style="flex:1; background: var(--bg); color: var(--text); border:1px solid var(--puny); padding: 10px;">
            <button onclick="findFeeds()" style="border-color: var(--accent);">Find</button>
        </div>
        <div id="logWrap" style="display:none; margin-bottom: 20px;">
            <div class="log-row"><div class="log-dot" id="d1"></div><span id="t1">Normalising URL</span></div>
            <div class="log-row"><div class="log-dot" id="d2"></div><span id="t2">Fetching HTML</span></div>
        </div>
        <div id="output"></div>
    </main>
    <script>
        const html = document.documentElement; const toggle = document.getElementById('theme-toggle');
        const saved = localStorage.getItem('theme') || 'dark'; html.setAttribute('data-theme', saved);
        async function findFeeds() {
            const raw = document.getElementById('siteUrl').value; if(!raw) return;
            document.getElementById('logWrap').style.display = 'block';
            document.getElementById('d1').classList.add('done');
            document.getElementById('output').innerHTML = '<p class="puny">Scanning...</p>';
            // Logic integrated from your feed-finder script...
        }
    </script>
</body>
</html>
