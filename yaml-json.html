<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YAML ↔ JSON | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 20px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
    #error { color: var(--accent); font-size: 0.8rem; min-height: 1.2rem; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 16px; }
    .tab { border: 1px solid var(--puny); padding: 5px 14px; cursor: pointer; font-size: 0.85rem; }
    .tab.active { background: var(--highlight); border-color: var(--text); }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>YAML ↔ JSON</h1>
    <p class="puny">Convert between YAML and JSON, or validate and prettify either format.</p>
    <div class="tool-layout">
      <div class="tab-bar">
        <div class="tab active" onclick="setMode('yaml-to-json')">YAML → JSON</div>
        <div class="tab" onclick="setMode('json-to-yaml')">JSON → YAML</div>
        <div class="tab" onclick="setMode('validate-json')">Validate JSON</div>
        <div class="tab" onclick="setMode('validate-yaml')">Validate YAML</div>
      </div>
      <div class="two-col">
        <div>
          <label id="input-label">YAML input</label>
          <textarea id="input" rows="18" oninput="convert()" placeholder=""></textarea>
        </div>
        <div>
          <label id="output-label">JSON output</label>
          <textarea id="output" rows="18" readonly></textarea>
        </div>
      </div>
      <div id="error"></div>
      <div class="action-bar">
        <button onclick="loadSample()">Sample</button>
        <button onclick="copyOutput()">Copy output</button>
        <button onclick="swapPanes()">⇄ Swap</button>
        <button onclick="clearAll()">Clear</button>
      </div>
    </div>
  </main>
  <footer style="margin-top:4rem;text-align:center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = htmlEl.getAttribute('data-theme'); const next = now==='dark'?'light':'dark'; htmlEl.setAttribute('data-theme',next); localStorage.setItem('theme',next); toggle.innerText=next==='dark'?'[light]':'[dark]'; };

    let mode = 'yaml-to-json';

    const samples = {
      'yaml-to-json': `name: eliana\nsite: tools.eliana.lol\ntools:\n  - name: CSV Parser\n    cdn: papaparse\n  - name: Diff Viewer\n    cdn: diff2html\nsettings:\n  theme: dark\n  monospace: true`,
      'json-to-yaml': `{\n  "name": "eliana",\n  "site": "tools.eliana.lol",\n  "tools": [\n    {"name": "CSV Parser", "cdn": "papaparse"},\n    {"name": "Diff Viewer", "cdn": "diff2html"}\n  ],\n  "settings": {"theme": "dark", "monospace": true}\n}`,
      'validate-json': `{\n  "valid": true,\n  "message": "This JSON is well-formed"\n}`,
      'validate-yaml': `valid: true\nmessage: This YAML is well-formed`,
    };

    function setMode(m) {
      mode = m;
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['yaml-to-json','json-to-yaml','validate-json','validate-yaml'][i]===m));
      const labels = { 'yaml-to-json':['YAML input','JSON output'], 'json-to-yaml':['JSON input','YAML output'], 'validate-json':['JSON input','Formatted output'], 'validate-yaml':['YAML input','Parsed structure'] };
      document.getElementById('input-label').textContent = labels[m][0];
      document.getElementById('output-label').textContent = labels[m][1];
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('error').textContent = '';
    }

    function convert() {
      const src = document.getElementById('input').value.trim();
      const err = document.getElementById('error');
      const out = document.getElementById('output');
      if (!src) { out.value=''; err.textContent=''; return; }
      try {
        if (mode==='yaml-to-json') {
          const obj = jsyaml.load(src);
          out.value = JSON.stringify(obj, null, 2);
        } else if (mode==='json-to-yaml') {
          const obj = JSON.parse(src);
          out.value = jsyaml.dump(obj, { indent: 2 });
        } else if (mode==='validate-json') {
          const obj = JSON.parse(src);
          out.value = JSON.stringify(obj, null, 2);
          err.textContent = '✓ Valid JSON';
          err.style.color = 'green';
          return;
        } else if (mode==='validate-yaml') {
          const obj = jsyaml.load(src);
          out.value = JSON.stringify(obj, null, 2);
          err.textContent = '✓ Valid YAML';
          err.style.color = 'green';
          return;
        }
        err.textContent = '';
      } catch(e) {
        err.textContent = e.message;
        err.style.color = 'var(--accent)';
        out.value = '';
      }
    }

    function loadSample() { document.getElementById('input').value = samples[mode]; convert(); }
    function copyOutput() { navigator.clipboard.writeText(document.getElementById('output').value); }
    function swapPanes() { const i = document.getElementById('input'), o = document.getElementById('output'); const tmp = i.value; i.value = o.value; o.value = tmp; }
    function clearAll() { document.getElementById('input').value=''; document.getElementById('output').value=''; document.getElementById('error').textContent=''; }
  </script>
</body>
</html>
