<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emoji Organizer | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 20px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 16px; }
    .tab { border: 1px solid var(--puny); padding: 5px 14px; cursor: pointer; font-size: 0.85rem; }
    .tab.active { background: var(--highlight); border-color: var(--text); }
    .pane { display: none; }
    .pane.active { display: block; }
    #emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 6px; max-height: 400px; overflow-y: auto; }
    .emoji-cell { border: 1px solid var(--puny); padding: 4px; text-align: center; font-size: 1.4rem; cursor: pointer; position: relative; }
    .emoji-cell:hover { background: var(--hover); border-color: var(--text); }
    .emoji-cell.selected { background: var(--highlight); border-color: var(--accent); }
    .emoji-name { font-size: 0.55rem; color: var(--puny); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #search-input { margin-bottom: 10px; }
    .cat-filter { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .cat-btn { font-size: 0.75rem; padding: 3px 8px; }
    .cat-btn.active { background: var(--highlight); border-color: var(--text); }
    .selected-bar { border: 1px solid var(--puny); padding: 10px; min-height: 50px; font-size: 1.4rem; letter-spacing: 4px; word-break: break-all; }
    #txt-result { font-size: 0.85rem; }
    .parse-row { display: flex; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--puny); font-size: 0.85rem; }
    .parse-em { font-size: 1.2rem; margin-right: 6px; }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>Emoji Organizer</h1>
    <p class="puny">Search, filter, and build emoji collections. Parse emoji text. Export in your pipe-delimited format.</p>
    <div class="tool-layout">
      <div class="tab-bar">
        <div class="tab active" onclick="switchTab('browse')">Browse</div>
        <div class="tab" onclick="switchTab('parse')">Parse text</div>
        <div class="tab" onclick="switchTab('collection')">Collection</div>
      </div>

      <div id="pane-browse" class="pane active">
        <input type="text" id="search-input" placeholder="Search emoji…" oninput="filterEmoji()" />
        <div class="cat-filter" id="cat-filter"></div>
        <div id="emoji-grid"></div>
        <div style="margin-top:12px">
          <label>Selected (<span id="sel-count">0</span>) — click to copy, click again to deselect</label>
          <div class="selected-bar" id="selected-display"></div>
          <div class="action-bar">
            <button onclick="copySelected()">Copy selected</button>
            <button onclick="addToCollection()">Add to collection</button>
            <button onclick="clearSelected()">Clear</button>
          </div>
        </div>
      </div>

      <div id="pane-parse" class="pane">
        <label>Paste text containing emoji</label>
        <textarea id="parse-input" rows="5" placeholder="Type or paste text with emoji 🎉🌟🔥…"></textarea>
        <div class="action-bar"><button onclick="parseEmoji()">Extract emoji</button></div>
        <div id="parse-results"></div>
      </div>

      <div id="pane-collection" class="pane">
        <label>Your collection (pipe-delimited: :name:|emoji)</label>
        <textarea id="collection-txt" rows="12" placeholder=":star:|⭐&#10;:fire:|🔥"></textarea>
        <div class="action-bar">
          <button onclick="parseCollection()">Parse</button>
          <button onclick="downloadCollection()">Download .txt</button>
          <button onclick="clearCollection()">Clear</button>
        </div>
        <div id="collection-preview" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:10px"></div>
      </div>
    </div>
  </main>
  <footer style="margin-top:4rem;text-align:center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = htmlEl.getAttribute('data-theme'); const next = now==='dark'?'light':'dark'; htmlEl.setAttribute('data-theme',next); localStorage.setItem('theme',next); toggle.innerText=next==='dark'?'[light]':'[dark]'; };

    // Curated emoji data
    const EMOJI = [
      {e:'😀',n:'grinning',c:'faces'},{e:'😂',n:'joy',c:'faces'},{e:'🥲',n:'smiling tear',c:'faces'},{e:'😍',n:'heart eyes',c:'faces'},{e:'🤔',n:'thinking',c:'faces'},{e:'😎',n:'cool',c:'faces'},{e:'🥳',n:'partying',c:'faces'},{e:'😴',n:'sleeping',c:'faces'},{e:'🙃',n:'upside down',c:'faces'},{e:'😬',n:'grimacing',c:'faces'},
      {e:'❤️',n:'red heart',c:'hearts'},{e:'🧡',n:'orange heart',c:'hearts'},{e:'💛',n:'yellow heart',c:'hearts'},{e:'💚',n:'green heart',c:'hearts'},{e:'💙',n:'blue heart',c:'hearts'},{e:'💜',n:'purple heart',c:'hearts'},{e:'🖤',n:'black heart',c:'hearts'},{e:'🤍',n:'white heart',c:'hearts'},{e:'💔',n:'broken heart',c:'hearts'},{e:'💕',n:'two hearts',c:'hearts'},
      {e:'⭐',n:'star',c:'nature'},{e:'🌙',n:'crescent moon',c:'nature'},{e:'☀️',n:'sun',c:'nature'},{e:'🌈',n:'rainbow',c:'nature'},{e:'🌸',n:'cherry blossom',c:'nature'},{e:'🌺',n:'hibiscus',c:'nature'},{e:'🌻',n:'sunflower',c:'nature'},{e:'🍀',n:'four leaf clover',c:'nature'},{e:'🌿',n:'herb',c:'nature'},{e:'🦋',n:'butterfly',c:'nature'},
      {e:'🎉',n:'party popper',c:'objects'},{e:'🎊',n:'confetti ball',c:'objects'},{e:'🎈',n:'balloon',c:'objects'},{e:'🎁',n:'gift',c:'objects'},{e:'🔥',n:'fire',c:'objects'},{e:'✨',n:'sparkles',c:'objects'},{e:'💫',n:'dizzy',c:'objects'},{e:'🌟',n:'glowing star',c:'objects'},{e:'💡',n:'light bulb',c:'objects'},{e:'🔮',n:'crystal ball',c:'objects'},
      {e:'🍕',n:'pizza',c:'food'},{e:'🍔',n:'burger',c:'food'},{e:'🍜',n:'ramen',c:'food'},{e:'🍣',n:'sushi',c:'food'},{e:'🍰',n:'cake slice',c:'food'},{e:'☕',n:'coffee',c:'food'},{e:'🧋',n:'boba tea',c:'food'},{e:'🍓',n:'strawberry',c:'food'},{e:'🍉',n:'watermelon',c:'food'},{e:'🥑',n:'avocado',c:'food'},
      {e:'💻',n:'laptop',c:'tech'},{e:'🖥️',n:'desktop',c:'tech'},{e:'📱',n:'phone',c:'tech'},{e:'⌨️',n:'keyboard',c:'tech'},{e:'🖱️',n:'mouse',c:'tech'},{e:'💾',n:'floppy disk',c:'tech'},{e:'📡',n:'satellite',c:'tech'},{e:'🔌',n:'plug',c:'tech'},{e:'🤖',n:'robot',c:'tech'},{e:'👾',n:'alien monster',c:'tech'},
      {e:'✅',n:'check mark',c:'symbols'},{e:'❌',n:'cross mark',c:'symbols'},{e:'⚠️',n:'warning',c:'symbols'},{e:'ℹ️',n:'information',c:'symbols'},{e:'🔴',n:'red circle',c:'symbols'},{e:'🟡',n:'yellow circle',c:'symbols'},{e:'🟢',n:'green circle',c:'symbols'},{e:'🔵',n:'blue circle',c:'symbols'},{e:'⭕',n:'ring',c:'symbols'},{e:'💯',n:'hundred',c:'symbols'},
    ];

    const CATS = ['all', ...new Set(EMOJI.map(e=>e.c))];
    let currentCat = 'all';
    let selected = [];

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['browse','parse','collection'][i]===tab));
      document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
      document.getElementById('pane-'+tab).classList.add('active');
    }

    function buildCatFilter() {
      document.getElementById('cat-filter').innerHTML = CATS.map(c =>
        `<button class="cat-btn${c===currentCat?' active':''}" onclick="selectCat('${c}')">${c}</button>`
      ).join('');
    }

    function selectCat(cat) { currentCat = cat; buildCatFilter(); filterEmoji(); }

    function filterEmoji() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const grid = document.getElementById('emoji-grid');
      const filtered = EMOJI.filter(e => (currentCat==='all'||e.c===currentCat) && (!q || e.n.includes(q) || e.e.includes(q)));
      grid.innerHTML = filtered.map(e =>
        `<div class="emoji-cell${selected.includes(e.e)?' selected':''}" onclick="toggleSelect('${e.e}')" title="${e.n}"><span>${e.e}</span><span class="emoji-name">${e.n}</span></div>`
      ).join('');
    }

    function toggleSelect(emoji) {
      const i = selected.indexOf(emoji);
      if (i>-1) selected.splice(i,1); else selected.push(emoji);
      document.getElementById('selected-display').textContent = selected.join(' ');
      document.getElementById('sel-count').textContent = selected.length;
      filterEmoji();
    }

    function copySelected() { navigator.clipboard.writeText(selected.join('')); }
    function clearSelected() { selected=[]; document.getElementById('selected-display').textContent=''; document.getElementById('sel-count').textContent='0'; filterEmoji(); }

    function addToCollection() {
      const txt = document.getElementById('collection-txt');
      const lines = selected.map(e => { const em = EMOJI.find(x=>x.e===e); return `:${em?em.n.replace(/ /g,'-'):e}:|${e}`; });
      txt.value = (txt.value.trim() ? txt.value.trim()+'\n' : '') + lines.join('\n');
      switchTab('collection');
    }

    function parseEmoji() {
      const text = document.getElementById('parse-input').value;
      const rx = /\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu;
      const matches = [...new Set(text.match(rx)||[])];
      const container = document.getElementById('parse-results');
      if (!matches.length) { container.innerHTML='<p class="puny">No emoji found.</p>'; return; }
      container.innerHTML = `<p class="puny">${matches.length} unique emoji found:</p>` + matches.map(e => {
        const em = EMOJI.find(x=>x.e===e);
        return `<div class="parse-row"><span class="parse-em">${e}</span><span>${em?em.n:'unknown'}</span><button style="margin-left:auto;font-size:0.75rem;padding:2px 8px" onclick="navigator.clipboard.writeText('${e}')">copy</button></div>`;
      }).join('');
    }

    function parseCollection() {
      const lines = document.getElementById('collection-txt').value.split('\n').map(l=>l.trim()).filter(Boolean);
      const preview = document.getElementById('collection-preview');
      preview.innerHTML = lines.map(l => {
        const [name, emoji] = l.split('|');
        if (!emoji) return '';
        return `<div style="border:1px solid var(--puny);padding:6px;text-align:center;cursor:pointer" onclick="navigator.clipboard.writeText('${emoji}')" title="Click to copy"><div style="font-size:1.5rem">${emoji}</div><div style="font-size:0.65rem;color:var(--puny)">${name}</div></div>`;
      }).join('');
    }

    function downloadCollection() {
      const txt = document.getElementById('collection-txt').value;
      const a = document.createElement('a');
      a.href = 'data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
      a.download = 'emojis.txt'; a.click();
    }

    function clearCollection() { document.getElementById('collection-txt').value=''; document.getElementById('collection-preview').innerHTML=''; }

    buildCatFilter();
    filterEmoji();
  </script>
</body>
</html>
