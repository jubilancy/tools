<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tool Name | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="icon" type="image/x-icon" href="favicon.svg" />
    <style>
      /* 1. LAYOUT & MONOSPACE */
      html {
        font-family: monospace;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 20px;
        overflow-y: scroll;
      }

      /* Variables for Theme Toggle */
      :root {
        --bg: #ffffff;
        --text: #000000;
        --hover: #eaddca;
        --puny: grey;
        --accent: #ff6600;
        --highlight: #ffff99;
      }

      html[data-theme='dark'] {
        --bg: #1c1c1c;
        --text: #d4d4d4;
        --hover: #3a3a3a;
        --puny: #a0a0a0;
        --accent: #ff9900;
        --highlight: #444;
      }

      /* System fallback */
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme='light']) {
          --bg: #1c1c1c;
          --text: #d4d4d4;
          --hover: #3a3a3a;
          --puny: #a0a0a0;
          --accent: #ff9900;
          --highlight: #444;
        }
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.5;
        margin: 0;
        padding: 20px 0;
      }

      main {
        width: 100%;
      }

      /* 2. NAVIGATION (Fixed Flexbox) */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--puny);
        margin-bottom: 2rem;
        font-size: 0.9rem;
        min-height: 1.5rem;
        /* Prevents layout jump during JS injection */
      }

      nav .left {
        display: flex;
        gap: 15px;
      }

      nav .right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* 3. LINKS & THEME TOGGLE */
      a {
        color: var(--text);
        text-decoration: none;
        border-bottom: 1px dotted var(--text);
      }

      a:hover {
        background-color: var(--hover);
      }

      nav a {
        border-bottom: 1px dotted var(--text);
      }

      #theme-toggle {
        background: none;
        border: none;
        color: inherit;
        font-family: monospace;
        cursor: pointer;
        padding: 0;
        border-bottom: 1px dotted var(--text);
      }

      #theme-toggle:hover {
        background-color: var(--hover);
      }

      /* 4. CHARACTER ELEMENTS */
      .changelog-marquee {
        font-size: 0.8rem;
        margin: 1rem 0;
        background-color: var(--highlight);
        border: 1px dashed var(--accent);
        padding: 0.5rem;
      }

      .puny {
        color: var(--puny);
        font-size: 0.75rem;
      }

      h1 {
        font-size: 1.2rem;
        text-transform: uppercase;
        margin-top: 2rem;
      }

      .section-title {
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.9rem;
        display: block;
        border-bottom: 1px solid var(--puny);
        margin-top: 2rem;
        padding-bottom: 5px;
      }

      /* 5. TOOL UI */
      textarea,
      input {
        width: 100%;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--puny);
        font-family: monospace;
        padding: 10px;
        box-sizing: border-box;
      }

      button {
        font-family: monospace;
        padding: 5px 10px;
        margin: 10px 5px 10px 0;
        cursor: pointer;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--text);
      }

      button:hover {
        background-color: var(--hover);
      }

      /* 6. GRID FOR INDEX */
      .tool-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin-top: 2rem;
        padding: 0;
      }

      .tool-grid li {
        border: 1px solid var(--puny);
        padding: 1rem;
        list-style: none;
      }

      .tool-grid li:hover {
        border-color: var(--text);
        background-color: var(--hover);
      }

      .tool-grid a {
        font-weight: bold;
        font-size: 1.1rem;
        border: none;
      }

      .tool-layout {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .action-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 10px 0;
      }

      label {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        font-weight: bold;
        color: var(--puny);
        margin-bottom: 5px;
      }

      /* Add tool-specific styles here */
      .status {
        font-size: 0.8rem;
        color: var(--puny);
        margin-top: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
        font-size: 0.9rem;
      }

      th {
        text-align: left;
        border-bottom: 2px solid var(--hover);
        color: var(--puny);
        text-transform: uppercase;
        font-size: 0.7rem;
      }

      td {
        padding: 8px 0;
        border-bottom: 1px solid var(--hover);
      }
    </style>
  </head>

  <body>
    <nav>
      <div class="left">
        <a href="index.html">home</a> | <a href="extra.html">extra</a> |
        <a href="credits.html">credits</a> |
        <a href="changelog.html">logs</a>
      </div>
      <div class="right">
        <button id="theme-toggle">[theme]</button> |
        <a href="https://eliana.lol">site</a>
      </div>
    </nav>

    <main>
      <h1>Batch ISBN Fetcher</h1>
      <p class="puny">
        Enter book titles (one per line) to retrieve ISBNs via Open Library.
      </p>

      <div class="tool-layout">
        <div>
          <label>Book Titles</label>
          <textarea
            id="titleInput"
            rows="8"
            placeholder="Enter book titles here..."
          ></textarea>
        </div>

        <div class="action-bar">
          <button
            id="startBtn"
            style="border-color: var(--accent); font-weight: bold"
          >
            ✨ Fetch ISBNs
          </button>
          <button id="exportBtn" style="display: none">Export CSV</button>
          <button
            id="clearAll"
            style="color: var(--accent); border-style: dashed"
          >
            Clear All
          </button>
        </div>

        <div id="progress-area" style="display: none">
          <label id="statusText">Ready</label>
          <div
            style="
              width: 100%;
              height: 4px;
              background: var(--hover);
              border-radius: 2px;
              overflow: hidden;
            "
          >
            <div
              id="progressBar"
              style="
                width: 0%;
                height: 100%;
                background: var(--accent);
                transition: width 0.3s;
              "
            ></div>
          </div>
        </div>

        <div id="results-container" style="display: none">
          <label>Results</label>
          <table id="resultsTable">
            <thead>
              <tr>
                <th>Title</th>
                <th>ISBN</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <footer style="margin-top: 4rem; text-align: center" class="puny">
      © 2026 eliana.lol • <a href="credits.html">credits</a>
    </footer>

    <script>
      const html = document.documentElement;
      const toggle = document.getElementById('theme-toggle');
      const saved =
        localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light');

      html.setAttribute('data-theme', saved);
      if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';

      if (toggle) {
        toggle.onclick = () => {
          const now = html.getAttribute('data-theme');
          const next = now === 'dark' ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
        };
      }
    </script>

    <script>
      const startBtn = document.getElementById('startBtn');
      const exportBtn = document.getElementById('exportBtn');
      const clearBtn = document.getElementById('clearAll');
      const titleInput = document.getElementById('titleInput');
      const progressBar = document.getElementById('progressBar');
      const statusText = document.getElementById('statusText');
      const resultsBody = document.getElementById('resultsBody');
      const progressArea = document.getElementById('progress-area');
      const resultsContainer = document.getElementById('results-container');

      let resultsData = [];
      const delay = (ms) => new Promise((res) => setTimeout(res, ms));

      startBtn.onclick = async () => {
        const titles = titleInput.value
          .split('\n')
          .map((t) => t.trim())
          .filter((t) => t.length > 0);
        if (titles.length === 0) return;

        resultsData = [];
        resultsBody.innerHTML = '';
        resultsContainer.style.display = 'block';
        progressArea.style.display = 'block';
        exportBtn.style.display = 'none';
        startBtn.disabled = true;
        startBtn.innerText = 'Processing...';

        for (let i = 0; i < titles.length; i++) {
          const title = titles[i];
          statusText.innerText = `Fetching ${i + 1}/${titles.length}: ${title}`;

          let isbnResult = 'Not Found';
          let fetchStatus = 'Success';

          try {
            const response = await fetch(
              `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&fields=title,isbn&limit=1`
            );
            const data = await response.json();
            if (data.docs?.[0]?.isbn?.length > 0) {
              const isbns = data.docs[0].isbn;
              isbnResult = isbns.find((code) => code.length === 13) || isbns[0];
            } else {
              isbnResult = 'Not Found';
            }
          } catch (error) {
            isbnResult = 'Error';
            fetchStatus = 'Failed';
          }

          resultsData.push({
            title,
            isbn: isbnResult,
          });

          const row = document.createElement('tr');
          row.innerHTML = `
                    <td>${title}</td>
                    <td><code>${isbnResult}</code></td>
                    <td style="color: ${fetchStatus === 'Failed' ? 'var(--accent)' : 'inherit'}">${fetchStatus}</td>
                `;
          resultsBody.appendChild(row);

          progressBar.style.width = `${((i + 1) / titles.length) * 100}%`;
          if (i < titles.length - 1) await delay(650);
        }

        statusText.innerText = `Finished ${titles.length} titles.`;
        startBtn.disabled = false;
        startBtn.innerText = '✨ Fetch ISBNs';
        exportBtn.style.display = 'inline-block';
      };

      clearBtn.onclick = () => {
        titleInput.value = '';
        resultsBody.innerHTML = '';
        resultsContainer.style.display = 'none';
        progressArea.style.display = 'none';
        exportBtn.style.display = 'none';
      };

      exportBtn.onclick = () => {
        if (resultsData.length === 0) return;
        const csvContent =
          'data:text/csv;charset=utf-8,' +
          'Title,ISBN\n' +
          resultsData
            .map((r) => `"${r.title.replace(/"/g, '""')}",${r.isbn}`)
            .join('\n');

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement('a');
        link.setAttribute('href', encodedUri);
        link.setAttribute('download', 'isbn_export.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };
    </script>
  </body>
</html>
