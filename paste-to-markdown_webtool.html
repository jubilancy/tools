<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paste to Markdown | tools.eliana.lol</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="global.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://unpkg.com/turndown@7.1.1/dist/turndown.js"></script>

    <style>
        /* Tool specific overrides to play nice with site nav */
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #pastebin {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        #output {
            font-family: ui-monospace, "Consolas", "Liberation Mono", Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            width: 100%;
            min-height: 300px;
        }

        /* Dark mode support for tool UI */
        .dark #output {
            background: #0f172a;
            color: #e0e0e0;
            border: 1px solid #334155;
        }

        .paste-hint {
            border: 2px dashed #3b82f6;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark .paste-hint {
            background: #1e293b;
        }

        .paste-hint:hover {
            border-color: #2563eb;
            opacity: 0.8;
        }
    </style>
</head>

<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                tools.eliana.lol
            </a>
            <div class="flex items-center gap-6">
                <ul class="hidden md:flex space-x-6 text-sm font-medium">
                    <li><a href="index.html" class="hover:text-blue-400 transition-colors">home</a></li>
                    <li><a href="rss-page.html" class="hover:text-blue-400 transition-colors">rss</a></li>
                    <li><a href="url-list-cleaner.html" class="hover:text-blue-400 transition-colors">url cleaner</a></li>
                </ul>
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 transition-all">🌙</button>
            </div>
        </div>
    </nav>

    <main class="container py-12">
        <h1 class="text-4xl font-extrabold mb-4">Paste to Markdown</h1>
        <p class="mb-8 opacity-70">
            <strong>Copy formatted text anywhere</strong> then press
            <kbd class="dark:bg-slate-800 dark:text-slate-300">Ctrl+V</kbd> (or <kbd class="dark:bg-slate-800 dark:text-slate-300">⌘+V</kbd>) <em>anywhere on this page</em>.
        </p>

        <div id="pastebin" contenteditable="true" tabindex="-1"></div>

        <div class="paste-hint" tabindex="0">
            <div style="font-size: 24px; margin-bottom: 10px">📋</div>
            <div class="font-bold">Paste formatted text here (Ctrl+V)</div>
            <small class="opacity-60 text-xs uppercase tracking-widest">Headings • Lists • Tables • Bold/Italic • Links • Code</small>
        </div>

        <textarea id="output" class="form-control mt-3" readonly placeholder="Markdown will appear here after pasting..."></textarea>

        <div class="mt-4 flex gap-2">
            <button id="selectAll" class="btn btn-primary bg-blue-600 border-none px-6 font-bold py-2">
                Select All & Copy
            </button>
            <button id="clear" class="btn btn-secondary px-6 font-bold py-2">Clear</button>
        </div>
    </main>

    <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 py-12 text-center text-slate-500 text-xs">
        &copy; 2026 eliana.lol
    </footer>

    <script>
        // 1. Theme Logic
        const toggle = document.getElementById('theme-toggle');
        const initTheme = () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                toggle.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                toggle.textContent = '🌙';
            }
        };
        initTheme();
        toggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            toggle.textContent = isDark ? '☀️' : '🌙';
        });

        // 2. Converter Logic
        function initConverter() {
            // Safety check for libraries
            if (typeof TurndownService === "undefined" || typeof DOMPurify === "undefined") {
                setTimeout(initConverter, 100);
                return;
            }

            const turndownService = new TurndownService({
                headingStyle: "atx",
                bulletListMarker: "-",
                codeBlockStyle: "fenced",
                emDelimiter: "*",
            });

            turndownService.addRule("strikethrough", {
                filter: ["del", "s", "strike"],
                replacement: (content) => "~~" + content + "~~",
            });

            const pastebin = document.getElementById("pastebin");
            const output = document.getElementById("output");
            const selectBtn = document.getElementById("selectAll");
            const clearBtn = document.getElementById("clear");
            const pasteHint = document.querySelector(".paste-hint");

            function processHtml(html) {
                try {
                    const cleanHtml = DOMPurify.sanitize(html);
                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = cleanHtml;
                    const markdown = turndownService.turndown(tempDiv);
                    output.value = markdown;
                    output.style.height = "auto";
                    output.style.height = Math.max(output.scrollHeight, 300) + "px";
                } catch (error) {
                    output.value = `Error: ${error.message}`;
                }
            }

            // Global paste listener
            document.addEventListener("paste", function(e) {
                const html = e.clipboardData?.getData("text/html");
                const text = e.clipboardData?.getData("text/plain");
                if (html || text) {
                    e.preventDefault();
                    processHtml(html || text);
                }
            });

            // Click-to-paste logic
            pasteHint.addEventListener("click", async () => {
                try {
                    pastebin.focus();
                    const clipboardItems = await navigator.clipboard.read();
                    for (const item of clipboardItems) {
                        if (item.types.includes("text/html")) {
                            const blob = await item.getType("text/html");
                            processHtml(await blob.text());
                            return;
                        } else if (item.types.includes("text/plain")) {
                            const blob = await item.getType("text/plain");
                            processHtml(await blob.text());
                            return;
                        }
                    }
                } catch (err) {
                    console.log("Clipboard access denied. Focusing for manual paste.");
                    pastebin.focus();
                }
            });

            // Button actions
            selectBtn.addEventListener("click", () => {
                output.select();
                document.execCommand("copy");
                const originalText = selectBtn.textContent;
                selectBtn.textContent = "Copied!";
                setTimeout(() => selectBtn.textContent = originalText, 1500);
            });

            clearBtn.addEventListener("click", () => {
                output.value = "";
                output.style.height = "300px";
            });
        }

        // FIRE THE LOGIC ON LOAD
        initConverter();
    </script>
</body>

</html>
