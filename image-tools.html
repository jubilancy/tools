<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Tools | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 20px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    #drop-zone { border: 2px dashed var(--puny); padding: 40px; text-align: center; cursor: pointer; color: var(--puny); }
    #drop-zone.over { border-color: var(--accent); color: var(--text); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
    img#preview-in, img#preview-out { max-width: 100%; max-height: 300px; border: 1px solid var(--puny); display: block; }
    input[type=range] { accent-color: var(--accent); width: 140px; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--puny); font-family: monospace; padding: 4px 8px; }
    .controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
    .cg { display: flex; flex-direction: column; gap: 4px; }
    #info { font-size: 0.8rem; color: var(--puny); }
    canvas { display: none; }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>Image Tools</h1>
    <p class="puny">Resize, crop, rotate, adjust brightness/contrast, and convert images — no upload needed.</p>
    <div class="tool-layout">
      <div>
        <div id="drop-zone" onclick="document.getElementById('img-file').click()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
          Drop an image or click to browse
        </div>
        <input type="file" id="img-file" accept="image/*" style="display:none" onchange="loadImage(this.files[0])" />
      </div>
      <div id="info"></div>
      <div class="controls">
        <div class="cg"><label>Width</label><input type="number" id="out-w" style="width:80px" /></div>
        <div class="cg"><label>Height</label><input type="number" id="out-h" style="width:80px" /></div>
        <div class="cg"><label><input type="checkbox" id="lock-ratio" checked /> Lock ratio</label></div>
        <div class="cg"><label>Rotate</label>
          <select id="rotate"><option value="0">0°</option><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select>
        </div>
        <div class="cg"><label>Brightness <span id="bright-val">100</span>%</label>
          <input type="range" id="brightness" min="0" max="200" value="100" oninput="document.getElementById('bright-val').textContent=this.value" /></div>
        <div class="cg"><label>Contrast <span id="contrast-val">100</span>%</label>
          <input type="range" id="contrast" min="0" max="200" value="100" oninput="document.getElementById('contrast-val').textContent=this.value" /></div>
        <div class="cg"><label>Grayscale</label><input type="checkbox" id="grayscale" /></div>
        <div class="cg"><label>Invert</label><input type="checkbox" id="invert" /></div>
      </div>
      <div class="action-bar">
        <button onclick="processImage()">Process</button>
        <label style="display:inline-flex;align-items:center;gap:6px;text-transform:none;font-weight:normal;color:var(--text)">
          Format: <select id="out-format"><option value="image/png">PNG</option><option value="image/jpeg">JPEG</option><option value="image/webp">WebP</option></select>
        </label>
        <label style="display:inline-flex;align-items:center;gap:6px;text-transform:none;font-weight:normal;color:var(--text)">
          Quality: <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.9" style="width:80px;accent-color:var(--accent)" />
        </label>
        <button onclick="downloadOutput()">Download</button>
      </div>
      <div class="two-col">
        <div><label>Original</label><img id="preview-in" alt="Original" /></div>
        <div><label>Processed</label><img id="preview-out" alt="Processed" /></div>
      </div>
      <canvas id="canvas"></canvas>
    </div>
  </main>
  <footer style="margin-top:4rem;text-align:center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = htmlEl.getAttribute('data-theme'); const next = now==='dark'?'light':'dark'; htmlEl.setAttribute('data-theme',next); localStorage.setItem('theme',next); toggle.innerText=next==='dark'?'[light]':'[dark]'; };

    let img = null; let origW = 0; let origH = 0;

    function dragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); }
    function dragLeave() { document.getElementById('drop-zone').classList.remove('over'); }
    function dropFile(e) { e.preventDefault(); dragLeave(); loadImage(e.dataTransfer.files[0]); }

    function loadImage(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const url = URL.createObjectURL(file);
      img = new Image();
      img.onload = () => {
        origW = img.width; origH = img.height;
        document.getElementById('out-w').value = origW;
        document.getElementById('out-h').value = origH;
        document.getElementById('preview-in').src = url;
        document.getElementById('info').textContent = `${file.name} — ${origW}×${origH} — ${(file.size/1024).toFixed(1)} KB`;
      };
      img.src = url;
    }

    document.getElementById('out-w').addEventListener('input', () => {
      if (document.getElementById('lock-ratio').checked && img) {
        document.getElementById('out-h').value = Math.round(document.getElementById('out-w').value * origH / origW);
      }
    });
    document.getElementById('out-h').addEventListener('input', () => {
      if (document.getElementById('lock-ratio').checked && img) {
        document.getElementById('out-w').value = Math.round(document.getElementById('out-h').value * origW / origH);
      }
    });

    function processImage() {
      if (!img) return;
      const w = parseInt(document.getElementById('out-w').value)||origW;
      const h = parseInt(document.getElementById('out-h').value)||origH;
      const rotate = parseInt(document.getElementById('rotate').value);
      const brightness = document.getElementById('brightness').value;
      const contrast = document.getElementById('contrast').value;
      const gray = document.getElementById('grayscale').checked;
      const inv = document.getElementById('invert').checked;
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const rad = rotate * Math.PI / 180;
      if (rotate===90||rotate===270) { canvas.width=h; canvas.height=w; } else { canvas.width=w; canvas.height=h; }
      ctx.save();
      ctx.translate(canvas.width/2, canvas.height/2);
      ctx.rotate(rad);
      ctx.filter = `brightness(${brightness}%) contrast(${contrast}%)${gray?' grayscale(1)':''}${inv?' invert(1)':''}`;
      ctx.drawImage(img, -w/2, -h/2, w, h);
      ctx.restore();
      document.getElementById('preview-out').src = canvas.toDataURL(document.getElementById('out-format').value, parseFloat(document.getElementById('quality').value));
    }

    function downloadOutput() {
      const src = document.getElementById('preview-out').src;
      if (!src || src===window.location.href) return;
      const fmt = document.getElementById('out-format').value;
      const ext = fmt.split('/')[1];
      const a = document.createElement('a'); a.href = src; a.download = 'output.'+ext; a.click();
    }
  </script>
</body>
</html>
