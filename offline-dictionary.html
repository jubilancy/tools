<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dictionary & Thesaurus | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 20px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    .result-card { border: 1px solid var(--puny); padding: 14px; margin-bottom: 10px; }
    .result-card h2 { font-size: 1.1rem; margin: 0 0 4px 0; }
    .pos { font-size: 0.75rem; color: var(--puny); text-transform: uppercase; margin-bottom: 8px; }
    .definition { font-size: 0.9rem; margin-bottom: 6px; }
    .example { font-size: 0.82rem; color: var(--puny); font-style: italic; margin-bottom: 6px; padding-left: 10px; border-left: 2px solid var(--puny); }
    .synonyms { font-size: 0.8rem; margin-top: 8px; }
    .synonym-tag { display: inline-block; border: 1px solid var(--puny); padding: 2px 8px; margin: 2px; cursor: pointer; font-size: 0.8rem; }
    .synonym-tag:hover { background: var(--hover); border-color: var(--text); }
    #phonetic { font-size: 0.85rem; color: var(--puny); }
    #audio-btn { font-size: 0.8rem; padding: 3px 10px; }
    .search-row { display: flex; gap: 8px; }
    .search-row input { flex: 1; }
    #status { font-size: 0.8rem; color: var(--puny); min-height: 1.2rem; }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>Dictionary & Thesaurus</h1>
    <p class="puny">Look up definitions, phonetics, examples, and synonyms. Uses the free Dictionary API — works offline for cached words.</p>
    <div class="tool-layout">
      <div>
        <label>Word</label>
        <div class="search-row">
          <input type="text" id="word-input" placeholder="e.g. ephemeral" onkeydown="if(event.key==='Enter')lookup()" />
          <button onclick="lookup()">Look up</button>
        </div>
        <div id="status"></div>
      </div>
      <div>
        <label>Recent lookups</label>
        <div id="history" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>
      <div id="results"></div>
    </div>
  </main>
  <footer style="margin-top:4rem;text-align:center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = htmlEl.getAttribute('data-theme'); const next = now==='dark'?'light':'dark'; htmlEl.setAttribute('data-theme',next); localStorage.setItem('theme',next); toggle.innerText=next==='dark'?'[light]':'[dark]'; };

    let history = JSON.parse(localStorage.getItem('dict-history')||'[]');
    let audioUrl = null;
    renderHistory();

    async function lookup() {
      const word = document.getElementById('word-input').value.trim().toLowerCase();
      if (!word) return;
      document.getElementById('status').textContent = 'Looking up…';
      document.getElementById('results').innerHTML = '';
      try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
        if (!res.ok) throw new Error('Word not found');
        const data = await res.json();
        document.getElementById('status').textContent = '';
        renderResults(data);
        if (!history.includes(word)) { history.unshift(word); history = history.slice(0,20); localStorage.setItem('dict-history',JSON.stringify(history)); renderHistory(); }
      } catch(e) {
        document.getElementById('status').textContent = e.message === 'Word not found' ? `"${word}" not found.` : 'Error: '+e.message;
      }
    }

    function renderResults(data) {
      audioUrl = null;
      const container = document.getElementById('results');
      const entry = data[0];
      let html = `<div class="result-card"><h2>${entry.word}</h2>`;
      const phonetic = entry.phonetics?.find(p=>p.text)||{};
      if (phonetic.text) html += `<div id="phonetic">${phonetic.text}`;
      if (phonetic.audio) { audioUrl = phonetic.audio; html += ` <button id="audio-btn" onclick="playAudio()">▶ play</button>`; }
      if (phonetic.text) html += `</div>`;
      html += `</div>`;
      entry.meanings?.forEach(m => {
        html += `<div class="result-card"><div class="pos">${m.partOfSpeech}</div>`;
        m.definitions?.slice(0,4).forEach((d,i) => {
          html += `<div class="definition"><strong>${i+1}.</strong> ${d.definition}</div>`;
          if (d.example) html += `<div class="example">"${d.example}"</div>`;
        });
        const syns = [...new Set([...(m.synonyms||[]),...m.definitions?.flatMap(d=>d.synonyms||[])||[]])].slice(0,12);
        if (syns.length) html += `<div class="synonyms"><span style="color:var(--puny);font-size:0.7rem;text-transform:uppercase">Synonyms: </span>${syns.map(s=>`<span class="synonym-tag" onclick="lookupWord('${s}')">${s}</span>`).join('')}</div>`;
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    function playAudio() {
      if (audioUrl) new Audio(audioUrl).play().catch(()=>{});
    }

    function lookupWord(word) {
      document.getElementById('word-input').value = word;
      lookup();
    }

    function renderHistory() {
      document.getElementById('history').innerHTML = history.map(w =>
        `<span class="synonym-tag" onclick="lookupWord('${w}')">${w}</span>`
      ).join('');
    }
  </script>
</body>
</html>
