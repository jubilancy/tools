  <!-- mdurl: inlined — no reliable UMD CDN build exists for this package -->
  <script>
    const mdurl = (function () {
      const CACHE = {}
      function getCache(exclude) {
        if (CACHE[exclude]) return CACHE[exclude]
        const c = CACHE[exclude] = []
        for (let i = 0; i < 128; i++) {
          const ch = String.fromCharCode(i)
          c.push(/^[A-Za-z0-9\-_.!~*'()]$/.test(ch) ? ch : encodeURIComponent(ch))
        }
        for (let i = 0; i < exclude.length; i++) c[exclude.charCodeAt(i)] = exclude[i]
        return c
      }
      function encode(str, exclude, keepEncoded) {
        if (typeof exclude !== 'string') { keepEncoded = exclude; exclude = ";/?:@&=+$,-_.!~*'()#" }
        if (keepEncoded === undefined) keepEncoded = false
        const c = getCache(exclude)
        let out = ''
        for (let i = 0; i < str.length; i++) {
          const code = str.charCodeAt(i)
          if (keepEncoded && code === 0x25 && i + 2 < str.length && /^[0-9a-f]{2}$/i.test(str.slice(i+1,i+3))) {
            out += str.slice(i, i+3); i += 2; continue
          }
          if (code < 128) { out += c[code]; continue }
          if (code >= 0xD800 && code <= 0xDBFF && i + 1 < str.length) {
            const next = str.charCodeAt(i + 1)
            if (next >= 0xDC00 && next <= 0xDFFF) { out += encodeURIComponent(str[i] + str[i+1]); i++; continue }
          }
          out += (code >= 0xD800 && code <= 0xDFFF) ? '%EF%BF%BD' : encodeURIComponent(str[i])
        }
        return out
      }
      function decode(str) {
        try { return decodeURIComponent(str) } catch (_) { return str }
      }
      decode.componentChars = "-_.!~*'()"
      return { encode, decode }
    }())
  </script>

  <script>
    /* eslint-env browser */
    /* global $, _, markdownit, hljs, twemoji, mdurl */

    // Guard: verify all critical globals loaded before proceeding
    var _missingLibs = []
    if (typeof $ === 'undefined')          _missingLibs.push('jQuery')
    if (typeof _ === 'undefined')          _missingLibs.push('lodash')
    if (typeof markdownit === 'undefined') _missingLibs.push('markdown-it')
    if (typeof hljs === 'undefined')       _missingLibs.push('highlight.js')
    if (_missingLibs.length > 0) {
      document.addEventListener('DOMContentLoaded', function () {
        document.body.innerHTML = '<div style="padding:40px;font-family:monospace;color:red">' +
          '<h2>Failed to load required scripts:</h2><ul>' +
          _missingLibs.map(function(l){ return '<li>' + l + '</li>' }).join('') +
          '</ul><p>Check your internet connection and reload.</p></div>'
      })
      throw new Error('Missing required libraries: ' + _missingLibs.join(', '))
    }

    let mdHtml, mdSrc, permalink, scrollMap

    const defaults = {
      html:         false,
      xhtmlOut:     false,
      breaks:       false,
      langPrefix:   'language-',
      linkify:      true,
      typographer:  true,
      _highlight:   true,
      _strict:      false,
      _view:        'html'   // 'html' | 'src' | 'debug'
    }

    defaults.highlight = function (str, lang) {
      const esc = mdHtml.utils.escapeHtml
      try {
        if (!defaults._highlight) throw new Error('highlighting disabled')
        if (lang && lang !== 'auto' && hljs.getLanguage(lang)) {
          return '<pre class="hljs language-' + esc(lang.toLowerCase()) + '"><code>' +
            hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
            '</code></pre>'
        } else if (lang === 'auto') {
          const result = hljs.highlightAuto(str)
          console.log('highlight language: ' + result.language + ', relevance: ' + result.relevance)
          return '<pre class="hljs language-' + esc(result.language) + '"><code>' +
            result.value +
            '</code></pre>'
        }
      } catch (__) { /**/ }
      return '<pre><code class="hljs">' + esc(str) + '</code></pre>'
    }

    function setOptionClass(name, val) {
      if (val) { $('body').addClass('opt_' + name) }
      else      { $('body').removeClass('opt_' + name) }
    }

    function setResultView(val) {
      $('body').removeClass('result-as-html result-as-src result-as-debug')
      $('body').addClass('result-as-' + val)
      defaults._view = val
    }

    function mdInit() {
      // markdown-it-emoji v2 UMD exposes { full, light } — we want .full
      const emojiPlugin = window.markdownitEmoji
        ? (window.markdownitEmoji.full || window.markdownitEmoji)
        : null

      function usePlugin(md, plugin, opt) {
        if (typeof plugin === 'function') {
          try { opt !== undefined ? md.use(plugin, opt) : md.use(plugin) } catch(e) { console.warn('Plugin failed:', e) }
        }
        return md
      }

      if (defaults._strict) {
        mdHtml = window.markdownit('commonmark')
        mdSrc  = window.markdownit('commonmark')
      } else {
        mdHtml = window.markdownit(defaults)
        usePlugin(mdHtml, window.markdownitAbbr)
        usePlugin(mdHtml, window.markdownitContainer, 'warning')
        usePlugin(mdHtml, window.markdownitDeflist)
        usePlugin(mdHtml, emojiPlugin)
        usePlugin(mdHtml, window.markdownitFootnote)
        usePlugin(mdHtml, window.markdownitIns)
        usePlugin(mdHtml, window.markdownitMark)
        usePlugin(mdHtml, window.markdownitSub)
        usePlugin(mdHtml, window.markdownitSup)

        mdSrc = window.markdownit(defaults)
        usePlugin(mdSrc, window.markdownitAbbr)
        usePlugin(mdSrc, window.markdownitContainer, 'warning')
        usePlugin(mdSrc, window.markdownitDeflist)
        usePlugin(mdSrc, emojiPlugin)
        usePlugin(mdSrc, window.markdownitFootnote)
        usePlugin(mdSrc, window.markdownitIns)
        usePlugin(mdSrc, window.markdownitMark)
        usePlugin(mdSrc, window.markdownitSub)
        usePlugin(mdSrc, window.markdownitSup)
      }

      // Prettier table output
      mdHtml.renderer.rules.table_open = function () {
        return '<table class="table table-striped">\n'
      }

      // Replace emoji codes with twemoji images (only if both plugin and twemoji loaded)
      if (window.twemoji && mdHtml.renderer.rules.emoji) {
        mdHtml.renderer.rules.emoji = function (token, idx) {
          return window.twemoji.parse(token[idx].content)
        }
      }

      // Inject line numbers for sync scroll
      function injectLineNumbers(tokens, idx, options, env, slf) {
        if (tokens[idx].map && tokens[idx].level === 0) {
          const line = tokens[idx].map[0]
          tokens[idx].attrJoin('class', 'line')
          tokens[idx].attrSet('data-line', String(line))
        }
        return slf.renderToken(tokens, idx, options, env, slf)
      }
      mdHtml.renderer.rules.paragraph_open = mdHtml.renderer.rules.heading_open = injectLineNumbers
    }

    function setHighlightedContent(selector, content, lang) {
      if (window.hljs) {
        $(selector).html(window.hljs.highlight(content, { language: lang }).value)
      } else {
        $(selector).text(content)
      }
    }

    function updateResult() {
      const source = $('.source').val()

      if (defaults._view === 'src') {
        setHighlightedContent('.result-src-content', mdSrc.render(source), 'html')
      } else if (defaults._view === 'debug') {
        setHighlightedContent(
          '.result-debug-content',
          JSON.stringify(mdSrc.parse(source, { references: {} }), null, 2),
          'json'
        )
      } else {
        $('.result-html').html(mdHtml.render(source))
      }

      scrollMap = null   // reset scroll cache on content update

      try {
        if (source) {
          permalink.href = '#md3=' + mdurl.encode(JSON.stringify({
            source,
            defaults: _.omit(defaults, 'highlight')
          }), '-_.!~', false)
        } else {
          permalink.href = ''
        }
      } catch (__) {
        permalink.href = ''
      }
    }

    function buildScrollMap() {
      const textarea      = $('.source')
      const sourceLikeDiv = $('<div />').css({
        position:    'absolute',
        visibility:  'hidden',
        height:      'auto',
        width:       textarea[0].clientWidth,
        'font-size':    textarea.css('font-size'),
        'font-family':  textarea.css('font-family'),
        'line-height':  textarea.css('line-height'),
        'white-space':  textarea.css('white-space')
      }).appendTo('body')

      const offset       = $('.result-html').scrollTop() - $('.result-html').offset().top
      const _scrollMap   = []
      const nonEmptyList = []
      const lineHeightMap = []

      let acc = 0
      textarea.val().split('\n').forEach(function (str) {
        lineHeightMap.push(acc)
        if (str.length === 0) { acc++; return }
        sourceLikeDiv.text(str)
        const h  = parseFloat(sourceLikeDiv.css('height'))
        const lh = parseFloat(sourceLikeDiv.css('line-height'))
        acc += Math.round(h / lh)
      })
      sourceLikeDiv.remove()
      lineHeightMap.push(acc)
      const linesCount = acc

      for (let i = 0; i < linesCount; i++) _scrollMap.push(-1)

      nonEmptyList.push(0)
      _scrollMap[0] = 0

      $('.line').each(function (n, el) {
        const $el = $(el)
        let t = $el.data('line')
        if (t === '') return
        t = lineHeightMap[t]
        if (t !== 0) nonEmptyList.push(t)
        _scrollMap[t] = Math.round($el.offset().top + offset)
      })

      nonEmptyList.push(linesCount)
      _scrollMap[linesCount] = $('.result-html')[0].scrollHeight

      let pos = 0
      for (let i = 1; i < linesCount; i++) {
        if (_scrollMap[i] !== -1) { pos++; continue }
        const a = nonEmptyList[pos]
        const b = nonEmptyList[pos + 1]
        _scrollMap[i] = Math.round((_scrollMap[b] * (i - a) + _scrollMap[a] * (b - i)) / (b - a))
      }

      return _scrollMap
    }

    const syncResultScroll = _.debounce(function () {
      const textarea   = $('.source')
      const lineHeight = parseFloat(textarea.css('line-height'))
      const lineNo     = Math.floor(textarea.scrollTop() / lineHeight)
      if (!scrollMap) scrollMap = buildScrollMap()
      const posTo = scrollMap[lineNo]
      $('.result-html').stop(true).animate({ scrollTop: posTo }, 100, 'linear')
    }, 50, { maxWait: 50 })

    const syncSrcScroll = _.debounce(function () {
      const resultHtml = $('.result-html')
      const scrollTop  = resultHtml.scrollTop()
      const textarea   = $('.source')
      const lineHeight = parseFloat(textarea.css('line-height'))
      if (!scrollMap) scrollMap = buildScrollMap()

      const lines = Object.keys(scrollMap)
      if (lines.length < 1) return

      let line = lines[0]
      for (let i = 1; i < lines.length; i++) {
        if (scrollMap[lines[i]] < scrollTop) { line = lines[i]; continue }
        break
      }
      textarea.stop(true).animate({ scrollTop: lineHeight * line }, 100, 'linear')
    }, 50, { maxWait: 50 })

    function loadPermalink() {
      if (!location.hash) return
      let cfg
      try {
        if      (/^#md3=/.test(location.hash)) {
          cfg = JSON.parse(mdurl.decode(location.hash.slice(5), mdurl.decode.componentChars))
        } else if (/^#md64=/.test(location.hash)) {
          cfg = JSON.parse(window.atob(location.hash.slice(6)))
        } else if (/^#md=/.test(location.hash))  {
          cfg = JSON.parse(decodeURIComponent(location.hash.slice(4)))
        } else { return }

        if (_.isString(cfg.source)) $('.source').val(cfg.source)
      } catch (__) { return }

      const opts = _.isObject(cfg.defaults) ? cfg.defaults : {}
      _.forOwn(opts, function (val, key) {
        if (!_.has(defaults, key)) return
        if (key === '_src') { defaults._view = val ? 'src' : 'html'; return }
        if ((_.isBoolean(defaults[key]) && _.isBoolean(val)) ||
            (_.isString(defaults[key])  && _.isString(val))) {
          defaults[key] = val
        }
      })
      if (['html', 'src', 'debug'].indexOf(defaults._view) === -1) defaults._view = 'html'
    }

    // ── Init on DOM ready ───────────────────────────────────────────────────
    $(function () {
      // Highlight any static code samples
      if (window.hljs) {
        $('pre.code-sample code').each(function (i, block) { window.hljs.highlightElement(block) })
      }

      loadPermalink()

      // Activate Bootstrap tooltips
      $('._tip').tooltip({ container: 'body' })

      // Bind option controls to defaults
      _.forOwn(defaults, function (val, key) {
        if (key === 'highlight') return
        const el  = document.getElementById(key)
        if (!el) return
        const $el = $(el)

        if (_.isBoolean(val)) {
          $el.prop('checked', val)
          $el.on('change', function () {
            const value = Boolean($el.prop('checked'))
            setOptionClass(key, value)
            defaults[key] = value
            mdInit()
            updateResult()
          })
          setOptionClass(key, val)
        } else {
          $el.val(val)
          $el.on('change update keyup', function () {
            defaults[key] = String($el.val())
            mdInit()
            updateResult()
          })
        }
      })

      setResultView(defaults._view)
      mdInit()
      permalink = document.getElementById('permalink')

      // Source textarea listeners
      $('.source').on('keyup paste cut mouseup', _.debounce(updateResult, 300, { maxWait: 500 }))

      $('.source').on('touchstart mouseover', function () {
        $('.result-html').off('scroll')
        $('.source').on('scroll', syncResultScroll)
      })

      $('.result-html').on('touchstart mouseover', function () {
        $('.source').off('scroll')
        $('.result-html').on('scroll', syncSrcScroll)
      })

      $('.source-clear').on('click', function (event) {
        $('.source').val('')
        updateResult()
        event.preventDefault()
      })

      $(document).on('click', '[data-result-as]', function (event) {
        const view = $(this).data('resultAs')
        if (view) {
          setResultView(view)
          updateResult()
          event.preventDefault()
        }
      })

      $(window).on('resize', function () { scrollMap = null })

      updateResult()
    })
  </script>
</body>
