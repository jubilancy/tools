<!DOCTYPE html>
<html>

<head>
    <title>markdown-it demo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- jQuery, lodash, Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.11.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">

    <!-- highlight.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- markdown-it core (UMD build — exposes window.markdownit) -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>

    <!-- markdown-it plugins (UMD/browser builds) -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-abbr@1/dist/markdown-it-abbr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@3/dist/markdown-it-footnote.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-ins@3/dist/markdown-it-ins.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-mark@3/dist/markdown-it-mark.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-sub@1/dist/markdown-it-sub.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-sup@1/dist/markdown-it-sup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-deflist@2/dist/markdown-it-deflist.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-container@3/dist/markdown-it-container.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-emoji@2/dist/markdown-it-emoji.min.js"></script>

    <!-- twemoji -->
    <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>

    <!-- mdurl (needed for permalink encoding/decoding) -->
    <script src="https://cdn.jsdelivr.net/npm/mdurl@1/index.js"></script>

    <style>
        html,
        body,
        .full-height {
            height: 100%;
        }

        body {
            overflow-x: hidden;
            padding-bottom: 160px;
            background-color: #fbfbfb;
        }

        /* hack to align emojis to line height */
        .emoji {
            height: 1.2em;
        }

        .demo-options {
            margin-bottom: 30px;
        }

        .opt__strict .not-strict {
            opacity: 0.3;
        }

        .checkbox {
            margin-right: 10px;
        }

        .source {
            width: 100%;
            font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
            font-size: 13px;
            padding: 2px;
        }

        .result-html {
            padding: 2px 10px;
            overflow: auto;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .result-html img {
            max-width: 35%;
        }

        .result-src,
        .result-debug {
            display: none;
        }

        .result-src-content,
        .result-debug-content {
            white-space: pre;
        }

        .result-as-html .result-html {
            display: block;
        }

        .result-as-html .result-src,
        .result-as-html .result-debug {
            display: none;
        }

        .result-as-src .result-src {
            display: block;
        }

        .result-as-src .result-html,
        .result-as-src .result-debug {
            display: none;
        }

        .result-as-debug .result-debug {
            display: block;
        }

        .result-as-debug .result-html,
        .result-as-debug .result-src {
            display: none;
        }

        .demo-control {
            position: absolute;
            right: 15px;
            top: -17px;
            border-radius: 6px 6px 0 0;
            font-size: 12px;
            background-color: #ddd;
        }

        .demo-control a {
            padding: 0 20px;
        }

        .demo-control a:first-child {
            padding-left: 30px;
        }

        .demo-control a:last-child {
            padding-right: 30px;
        }

        /* twbs fix */
        .hljs {
            padding: 9.5px;
        }

        .hljs code {
            white-space: pre;
        }

        .footnotes {
            -moz-column-count: 2;
            column-count: 2;
        }

        .footnotes-list {
            padding-left: 2em;
        }

        /* custom container */
        .warning {
            background-color: #ff8;
            padding: 20px;
            border-radius: 6px;
        }

        .gh-ribbon {
            display: block;
            position: absolute;
            right: -60px;
            top: 44px;
            transform: rotate(45deg);
            width: 230px;
            z-index: 10000;
            white-space: nowrap;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #686868;
            box-shadow: 0 0 2px rgba(102, 102, 102, 0.4);
            padding: 1px 0;
        }

        .gh-ribbon a {
            text-decoration: none !important;
            border: 1px solid #ccc;
            color: #fff;
            display: block;
            font-size: 13px;
            font-weight: 700;
            outline: medium none;
            padding: 4px 50px 2px;
            text-align: center;
        }

        /* Override default Bootstrap responsiveness for inline form */
        .form-inline .radio,
        .form-inline .checkbox {
            display: inline-block;
            margin-bottom: 0;
            margin-top: 0;
        }

        .form-inline .form-group {
            display: inline-block;
            margin-bottom: 0;
            vertical-align: middle;
        }

        .form-inline .form-control {
            display: inline-block;
            vertical-align: middle;
            width: auto;
        }

        /* Fix: columns must be position:relative so .demo-control (absolute) anchors to them */
        .col-xs-6.full-height {
            position: relative;
            padding-top: 20px;
            /* room for the .demo-control tab sitting at top:-17px */
        }

        /* Ensure textarea and result panel fill remaining column height */
        .source,
        .result-html,
        .result-src,
        .result-debug {
            height: calc(100% - 4px);
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>markdown-it <small>demo</small></h1>
        <div class="form-inline demo-options">
            <div class="checkbox not-strict">
                <label class="_tip" title="enable html tags in source text">
                    <input id="html" type="checkbox"> html
                </label>
            </div>
            <div class="checkbox not-strict">
                <label class="_tip" title="produce xhtml output (add / to single tags (&lt;br /&gt; instead of &lt;br&gt;)">
                    <input id="xhtmlOut" type="checkbox"> xhtmlOut
                </label>
            </div>
            <div class="checkbox not-strict">
                <label class="_tip" title="newlines in paragraphs are rendered as &lt;br&gt;">
                    <input id="breaks" type="checkbox"> breaks
                </label>
            </div>
            <div class="checkbox not-strict">
                <label class="_tip" title="autoconvert link-like texts to links">
                    <input id="linkify" type="checkbox"> linkify
                </label>
            </div>
            <div class="checkbox not-strict">
                <label class="_tip" title="do typographic replacements, (c) → © and so on">
                    <input id="typographer" type="checkbox"> typographer
                </label>
            </div>
            <div class="checkbox not-strict">
                <label class="_tip" title="enable output highlight for fenced blocks">
                    <input id="_highlight" type="checkbox"> highlight
                </label>
            </div>
            <div class="form-group not-strict">
                <input class="form-control _tip" id="langPrefix" type="text" placeholder="language prefix" title="css class language prefix for fenced code blocks">
            </div>
            <div class="checkbox">
                <label class="_tip" title="force strict CommonMark mode - output will be equal to reference parser">
                    <input id="_strict" type="checkbox"> CommonMark strict
                </label>
            </div>
        </div>
    </div>

    <div class="container full-height">
        <div class="row full-height">
            <div class="col-xs-6 full-height">
                <div class="demo-control">
                    <a class="source-clear" href="#">clear</a>
                    <a id="permalink" href="./" title="Share this snippet as link"><strong>permalink</strong></a>
                </div>
                <textarea class="source full-height"># Hello, markdown-it!

This is a **live demo**. Edit this text on the left and see the result on the right.

---

## Features

- *italic* and **bold**
- ~~strikethrough~~ (needs plugin)
- `inline code`
- [links](https://github.com/markdown-it/markdown-it)

## Code block

```js
var md = markdownit();
var result = md.render('# Hello!');
console.log(result);
```

## Emoji :tada:

Emoji support via twemoji: :smile: :rocket: :+1:

## Footnote

Here is a footnote reference,[^1] and another.[^longnote]

[^1]: Here is the footnote.
[^longnote]: Here's one with multiple blocks.

## Custom container

::: warning
This is a **warning** custom container block.
:::

## Tables

| Feature     | Supported |
|-------------|-----------|
| Tables      | ✅        |
| Code blocks | ✅        |
| Footnotes   | ✅        |
</textarea>
            </div>
            <section class="col-xs-6 full-height">
                <div class="demo-control">
                    <a href="#" data-result-as="html">html</a>
                    <a href="#" data-result-as="src">source</a>
                    <a href="#" data-result-as="debug">debug</a>
                </div>
                <div class="result-html full-height"></div>
                <pre class="hljs result-src full-height"><code class="result-src-content full-height"></code></pre>
                <pre class="hljs result-debug full-height"><code class="result-debug-content full-height"></code></pre>
            </section>
        </div>
    </div>

    <div class="gh-ribbon">
        <a href="https://github.com/markdown-it/markdown-it" target="_blank">Fork me on GitHub</a>
    </div>

    <script>
        /* eslint-env browser */
        /* global $, _, markdownit, hljs, twemoji, mdurl */

        let mdHtml, mdSrc, permalink, scrollMap

        const defaults = {
            html: false,
            xhtmlOut: false,
            breaks: false,
            langPrefix: 'language-',
            linkify: true,
            typographer: true,
            _highlight: true,
            _strict: false,
            _view: 'html' // 'html' | 'src' | 'debug'
        }

        defaults.highlight = function(str, lang) {
            const esc = mdHtml.utils.escapeHtml
            try {
                if (!defaults._highlight) throw new Error('highlighting disabled')
                if (lang && lang !== 'auto' && hljs.getLanguage(lang)) {
                    return '<pre class="hljs language-' + esc(lang.toLowerCase()) + '"><code>' +
                        hljs.highlight(str, {
                            language: lang,
                            ignoreIllegals: true
                        }).value +
                        '</code></pre>'
                } else if (lang === 'auto') {
                    const result = hljs.highlightAuto(str)
                    console.log('highlight language: ' + result.language + ', relevance: ' + result.relevance)
                    return '<pre class="hljs language-' + esc(result.language) + '"><code>' +
                        result.value +
                        '</code></pre>'
                }
            } catch (__) {
                /**/
            }
            return '<pre><code class="hljs">' + esc(str) + '</code></pre>'
        }

        function setOptionClass(name, val) {
            if (val) {
                $('body').addClass('opt_' + name)
            } else {
                $('body').removeClass('opt_' + name)
            }
        }

        function setResultView(val) {
            $('body').removeClass('result-as-html result-as-src result-as-debug')
            $('body').addClass('result-as-' + val)
            defaults._view = val
        }

        function mdInit() {
            if (defaults._strict) {
                mdHtml = window.markdownit('commonmark')
                mdSrc = window.markdownit('commonmark')
            } else {
                mdHtml = window.markdownit(defaults)
                    .use(window.markdownitAbbr)
                    .use(window.markdownitContainer, 'warning')
                    .use(window.markdownitDeflist)
                    .use(window.markdownitEmoji)
                    .use(window.markdownitFootnote)
                    .use(window.markdownitIns)
                    .use(window.markdownitMark)
                    .use(window.markdownitSub)
                    .use(window.markdownitSup)

                mdSrc = window.markdownit(defaults)
                    .use(window.markdownitAbbr)
                    .use(window.markdownitContainer, 'warning')
                    .use(window.markdownitDeflist)
                    .use(window.markdownitEmoji)
                    .use(window.markdownitFootnote)
                    .use(window.markdownitIns)
                    .use(window.markdownitMark)
                    .use(window.markdownitSub)
                    .use(window.markdownitSup)
            }

            // Prettier table output
            mdHtml.renderer.rules.table_open = function() {
                return '<table class="table table-striped">\n'
            }

            // Replace emoji codes with twemoji images
            mdHtml.renderer.rules.emoji = function(token, idx) {
                return window.twemoji.parse(token[idx].content)
            }

            // Inject line numbers for sync scroll
            function injectLineNumbers(tokens, idx, options, env, slf) {
                if (tokens[idx].map && tokens[idx].level === 0) {
                    const line = tokens[idx].map[0]
                    tokens[idx].attrJoin('class', 'line')
                    tokens[idx].attrSet('data-line', String(line))
                }
                return slf.renderToken(tokens, idx, options, env, slf)
            }
            mdHtml.renderer.rules.paragraph_open = mdHtml.renderer.rules.heading_open = injectLineNumbers
        }

        function setHighlightedContent(selector, content, lang) {
            if (window.hljs) {
                $(selector).html(window.hljs.highlight(content, {
                    language: lang
                }).value)
            } else {
                $(selector).text(content)
            }
        }

        function updateResult() {
            const source = $('.source').val()

            if (defaults._view === 'src') {
                setHighlightedContent('.result-src-content', mdSrc.render(source), 'html')
            } else if (defaults._view === 'debug') {
                setHighlightedContent(
                    '.result-debug-content',
                    JSON.stringify(mdSrc.parse(source, {
                        references: {}
                    }), null, 2),
                    'json'
                )
            } else {
                $('.result-html').html(mdHtml.render(source))
            }

            scrollMap = null // reset scroll cache on content update

            try {
                if (source) {
                    permalink.href = '#md3=' + mdurl.encode(JSON.stringify({
                        source,
                        defaults: _.omit(defaults, 'highlight')
                    }), '-_.!~', false)
                } else {
                    permalink.href = ''
                }
            } catch (__) {
                permalink.href = ''
            }
        }

        function buildScrollMap() {
            const textarea = $('.source')
            const sourceLikeDiv = $('<div />').css({
                position: 'absolute',
                visibility: 'hidden',
                height: 'auto',
                width: textarea[0].clientWidth,
                'font-size': textarea.css('font-size'),
                'font-family': textarea.css('font-family'),
                'line-height': textarea.css('line-height'),
                'white-space': textarea.css('white-space')
            }).appendTo('body')

            const offset = $('.result-html').scrollTop() - $('.result-html').offset().top
            const _scrollMap = []
            const nonEmptyList = []
            const lineHeightMap = []

            let acc = 0
            textarea.val().split('\n').forEach(function(str) {
                lineHeightMap.push(acc)
                if (str.length === 0) {
                    acc++;
                    return
                }
                sourceLikeDiv.text(str)
                const h = parseFloat(sourceLikeDiv.css('height'))
                const lh = parseFloat(sourceLikeDiv.css('line-height'))
                acc += Math.round(h / lh)
            })
            sourceLikeDiv.remove()
            lineHeightMap.push(acc)
            const linesCount = acc

            for (let i = 0; i < linesCount; i++) _scrollMap.push(-1)

            nonEmptyList.push(0)
            _scrollMap[0] = 0

            $('.line').each(function(n, el) {
                const $el = $(el)
                let t = $el.data('line')
                if (t === '') return
                t = lineHeightMap[t]
                if (t !== 0) nonEmptyList.push(t)
                _scrollMap[t] = Math.round($el.offset().top + offset)
            })

            nonEmptyList.push(linesCount)
            _scrollMap[linesCount] = $('.result-html')[0].scrollHeight

            let pos = 0
            for (let i = 1; i < linesCount; i++) {
                if (_scrollMap[i] !== -1) {
                    pos++;
                    continue
                }
                const a = nonEmptyList[pos]
                const b = nonEmptyList[pos + 1]
                _scrollMap[i] = Math.round((_scrollMap[b] * (i - a) + _scrollMap[a] * (b - i)) / (b - a))
            }

            return _scrollMap
        }

        const syncResultScroll = _.debounce(function() {
            const textarea = $('.source')
            const lineHeight = parseFloat(textarea.css('line-height'))
            const lineNo = Math.floor(textarea.scrollTop() / lineHeight)
            if (!scrollMap) scrollMap = buildScrollMap()
            const posTo = scrollMap[lineNo]
            $('.result-html').stop(true).animate({
                scrollTop: posTo
            }, 100, 'linear')
        }, 50, {
            maxWait: 50
        })

        const syncSrcScroll = _.debounce(function() {
            const resultHtml = $('.result-html')
            const scrollTop = resultHtml.scrollTop()
            const textarea = $('.source')
            const lineHeight = parseFloat(textarea.css('line-height'))
            if (!scrollMap) scrollMap = buildScrollMap()

            const lines = Object.keys(scrollMap)
            if (lines.length < 1) return

            let line = lines[0]
            for (let i = 1; i < lines.length; i++) {
                if (scrollMap[lines[i]] < scrollTop) {
                    line = lines[i];
                    continue
                }
                break
            }
            textarea.stop(true).animate({
                scrollTop: lineHeight * line
            }, 100, 'linear')
        }, 50, {
            maxWait: 50
        })

        function loadPermalink() {
            if (!location.hash) return
            let cfg
            try {
                if (/^#md3=/.test(location.hash)) {
                    cfg = JSON.parse(mdurl.decode(location.hash.slice(5), mdurl.decode.componentChars))
                } else if (/^#md64=/.test(location.hash)) {
                    cfg = JSON.parse(window.atob(location.hash.slice(6)))
                } else if (/^#md=/.test(location.hash)) {
                    cfg = JSON.parse(decodeURIComponent(location.hash.slice(4)))
                } else {
                    return
                }

                if (_.isString(cfg.source)) $('.source').val(cfg.source)
            } catch (__) {
                return
            }

            const opts = _.isObject(cfg.defaults) ? cfg.defaults : {}
            _.forOwn(opts, function(val, key) {
                if (!_.has(defaults, key)) return
                if (key === '_src') {
                    defaults._view = val ? 'src' : 'html';
                    return
                }
                if ((_.isBoolean(defaults[key]) && _.isBoolean(val)) ||
                    (_.isString(defaults[key]) && _.isString(val))) {
                    defaults[key] = val
                }
            })
            if (['html', 'src', 'debug'].indexOf(defaults._view) === -1) defaults._view = 'html'
        }

        // ── Init on DOM ready ───────────────────────────────────────────────────
        $(function() {
            // Highlight any static code samples
            if (window.hljs) {
                $('pre.code-sample code').each(function(i, block) {
                    window.hljs.highlightElement(block)
                })
            }

            loadPermalink()

            // Activate Bootstrap tooltips
            $('._tip').tooltip({
                container: 'body'
            })

            // Bind option controls to defaults
            _.forOwn(defaults, function(val, key) {
                if (key === 'highlight') return
                const el = document.getElementById(key)
                if (!el) return
                const $el = $(el)

                if (_.isBoolean(val)) {
                    $el.prop('checked', val)
                    $el.on('change', function() {
                        const value = Boolean($el.prop('checked'))
                        setOptionClass(key, value)
                        defaults[key] = value
                        mdInit()
                        updateResult()
                    })
                    setOptionClass(key, val)
                } else {
                    $el.val(val)
                    $el.on('change update keyup', function() {
                        defaults[key] = String($el.val())
                        mdInit()
                        updateResult()
                    })
                }
            })

            setResultView(defaults._view)
            mdInit()
            permalink = document.getElementById('permalink')

            // Source textarea listeners
            $('.source').on('keyup paste cut mouseup', _.debounce(updateResult, 300, {
                maxWait: 500
            }))

            $('.source').on('touchstart mouseover', function() {
                $('.result-html').off('scroll')
                $('.source').on('scroll', syncResultScroll)
            })

            $('.result-html').on('touchstart mouseover', function() {
                $('.source').off('scroll')
                $('.result-html').on('scroll', syncSrcScroll)
            })

            $('.source-clear').on('click', function(event) {
                $('.source').val('')
                updateResult()
                event.preventDefault()
            })

            $(document).on('click', '[data-result-as]', function(event) {
                const view = $(this).data('resultAs')
                if (view) {
                    setResultView(view)
                    updateResult()
                    event.preventDefault()
                }
            })

            $(window).on('resize', function() {
                scrollMap = null
            })

            updateResult()
        })
    </script>
</body>

</html>
