<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bulk Feed Finder | tools.eliana.lol</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="global.css">

    <style>
        .feed-item { @apply p-3 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 mb-2 flex justify-between items-center; }
        .url-input { @apply w-full p-4 bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl focus:border-blue-500 focus:ring-0 transition-all font-mono text-sm; }
    </style>
</head>
<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                tools.eliana.lol
            </a>
            <div class="flex items-center gap-6">
                <ul class="hidden md:flex space-x-6 text-sm font-medium">
                    <li><a href="index.html" class="hover:text-blue-400 transition-colors">home</a></li>
                    <li><a href="rss-page.html" class="hover:text-blue-400 transition-colors">rss</a></li>
                    <li><a href="url-list-cleaner.html" class="hover:text-blue-400 transition-colors">url cleaner</a></li>
                </ul>
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800">🌙</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-12 w-full">
        <h1 class="text-4xl font-extrabold mb-4">Bulk Feed Finder</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">
            Powered by <code>rss-agent-discovery</code>. We'll check HTML tags and brute-force common paths like <code>/rss</code> and <code>/feed.xml</code>.
        </p>

        <div class="space-y-6">
            <textarea id="urlInput" rows="8" placeholder="theverge.com&#10;j3s.sh&#10;eliana.lol" class="url-input"></textarea>
            
            <div class="flex gap-3">
                <button id="findFeeds" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl transition shadow-lg shadow-blue-500/20 active:scale-95">
                    Start Bulk Discovery
                </button>
                <button id="clearBtn" class="text-slate-500 hover:text-red-500 px-4 py-3 rounded-xl transition text-sm font-bold">
                    Clear
                </button>
            </div>

            <div id="results" class="space-y-8 mt-10"></div>
        </div>
    </main>

    <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 py-12 text-center text-slate-500 text-xs">
        &copy; 2026 eliana.lol
    </footer>

    <script type="module">
        // Importing the logic directly from NPM via ESM.sh
        import { findRssFeeds } from 'https://esm.sh/rss-agent-discovery@0.1.6';

        const urlInput = document.getElementById('urlInput');
        const resultsDiv = document.getElementById('results');
        const findBtn = document.getElementById('findFeeds');

        // Note: The NPM package expects to be able to fetch. 
        // In the browser, we still need a proxy to avoid CORS errors.
        async function discoveryWrapper(targetUrl) {
            let cleanUrl = targetUrl.trim();
            if (!/^https?:\/\//i.test(cleanUrl)) cleanUrl = 'https://' + cleanUrl;

            const container = document.createElement('div');
            container.innerHTML = `<h3 class="text-lg font-bold mb-3 text-blue-500 font-mono underline">${cleanUrl}</h3><div class="loading opacity-50 text-sm">Searching...</div>`;
            resultsDiv.appendChild(container);

            try {
                // We use the proxy to get the HTML, then pass it to the package logic
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(cleanUrl)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // The package can accept a URL or a raw HTML string. 
                // Using findRssFeeds from the package:
                const discovered = await findRssFeeds(cleanUrl, {
                    fetcher: async (u) => {
                        // We override the internal fetcher to use our CORS proxy
                        const p = `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`;
                        const r = await fetch(p);
                        const d = await r.json();
                        return d.contents;
                    }
                });

                container.querySelector('.loading').remove();

                if (!discovered || discovered.length === 0) {
                    container.innerHTML += `<p class="text-sm text-red-500 italic">No feeds found.</p>`;
                } else {
                    discovered.forEach(feed => {
                        const item = document.createElement('div');
                        item.className = 'feed-item';
                        item.innerHTML = `
                            <div>
                                <span class="text-[10px] font-bold bg-blue-500 text-white px-1 rounded mr-2 uppercase">${feed.type || 'XML'}</span>
                                <span class="text-sm font-medium">${feed.title || 'Feed'}</span>
                                <div class="text-[10px] text-slate-500 font-mono mt-1">${feed.url}</div>
                            </div>
                            <button onclick="navigator.clipboard.writeText('${feed.url}'); this.innerText='Copied!';" class="text-xs text-blue-500 hover:underline">Copy</button>
                        `;
                        container.appendChild(item);
                    });
                }
            } catch (err) {
                container.innerHTML += `<p class="text-sm text-red-500 italic">Error: Site blocked or invalid.</p>`;
            }
        }

        findBtn.onclick = async () => {
            const urls = urlInput.value.split('\n').filter(u => u.trim() !== '');
            resultsDiv.innerHTML = '';
            for (const url of urls) {
                await discoveryWrapper(url);
            }
        };

        document.getElementById('clearBtn').onclick = () => {
            urlInput.value = '';
            resultsDiv.innerHTML = '';
        };

        // Standard Theme Toggle
        const toggle = document.getElementById('theme-toggle');
        toggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            toggle.textContent = isDark ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
