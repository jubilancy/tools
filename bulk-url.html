<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open Multiple URLs | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css">
    <style>
        /* Tool-specific UI */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 15px;
            border: 1px dashed var(--puny);
            background: var(--hover);
            margin-bottom: 20px;
        }
        .option-group { display: flex; flex-direction: column; gap: 5px; }
        .option-group label { font-size: 0.85rem; cursor: pointer; }
        
        #status {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid var(--accent);
            background: var(--highlight);
            font-size: 0.85rem;
        }
        .hidden { display: none; }
        
        .tip-box {
            margin-top: 2rem;
            padding: 15px;
            border: 1px solid var(--puny);
            font-size: 0.8rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <nav>
      <div class="left">
        <a href="index.html">home</a> | 
        <a href="extra.html">extra</a> | 
        <a href="credits.html">credits</a> |
        <a href="changelog.html">logs</a>
      </div>
      <div class="right">
        <button id="theme-toggle">[theme]</button> |
        <a href="https://eliana.lol">site</a>
      </div>
    </nav>

    <main>
        <h1>Open Multiple URLs</h1>
        <p class="puny">Paste URLs (one per line) to open them all in new tabs/windows.</p>

        <div class="options-grid">
            <div class="option-group">
                <span class="section-title" style="margin-top:0; font-size:0.7rem;">Mode</span>
                <label><input type="radio" name="openMode" value="tabs" checked> New Tabs</label>
                <label><input type="radio" name="openMode" value="windows"> New Windows</label>
            </div>
            <div class="option-group">
                <span class="section-title" style="margin-top:0; font-size:0.7rem;">Settings</span>
                <label><input type="checkbox" id="addProtocol" checked> Add http:// if missing</label>
                <label>Delay (ms): <input type="number" id="delay" value="100" style="width:60px; padding:2px;"></label>
            </div>
        </div>

        <textarea id="urls" rows="12" placeholder="https://example.com&#10;https://google.com"></textarea>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
            <div id="stats" class="puny italic">0 URLs detected</div>
            <div>
                <button id="example">Load Example</button>
                <button id="clear">Clear</button>
                <button id="openAll" style="border-color: var(--accent); font-weight: bold;">🚀 Open All</button>
            </div>
        </div>

        <div id="status" class="hidden"></div>

        <div class="tip-box">
            <strong>💡 Browser Tip:</strong> Most browsers block bulk popups by default. Look for the "Always allow popups" icon in your URL bar if nothing happens.
        </div>
    </main>

    <script>
        const html = document.documentElement;
        const toggle = document.getElementById('theme-toggle');
        const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        html.setAttribute('data-theme', saved);
        if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';

        if (toggle) {
            toggle.onclick = () => {
                const now = html.getAttribute('data-theme');
                const next = now === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
            };
        }
    </script>

    <script>
        const urlsTextarea = document.getElementById('urls');
        const openAllBtn = document.getElementById('openAll');
        const clearBtn = document.getElementById('clear');
        const exampleBtn = document.getElementById('example');
        const statusDiv = document.getElementById('status');
        const statsDiv = document.getElementById('stats');
        const addProtocolCheckbox = document.getElementById('addProtocol');
        const delayInput = document.getElementById('delay');

        function updateStats() {
            const urls = extractUrls(urlsTextarea.value);
            statsDiv.textContent = `${urls.length} URL${urls.length !== 1 ? 's' : ''} detected`;
        }

        function showStatus(message) {
            statusDiv.textContent = message;
            statusDiv.classList.remove('hidden');
            setTimeout(() => statusDiv.classList.add('hidden'), 5000);
        }

        function extractUrls(text) {
            const addProtocol = addProtocolCheckbox.checked;
            return text.split(/\r?\n/)
                .map(line => line.trim())
                .filter(line => line !== '')
                .map(line => {
                    if (addProtocol && !line.match(/^https?:\/\//i)) {
                        return 'http://' + line;
                    }
                    return line;
                });
        }

        openAllBtn.onclick = () => {
            const urls = extractUrls(urlsTextarea.value.trim());
            if (urls.length === 0) return alert('Enter some URLs first!');

            const mode = document.querySelector('input[name="openMode"]:checked').value;
            const delay = parseInt(delayInput.value) || 100;

            showStatus(`Opening ${urls.length} items...`);

            urls.forEach((url, index) => {
                setTimeout(() => {
                    const features = mode === 'windows' ? 'width=800,height=600,noopener,noreferrer' : '';
                    window.open(url, '_blank', features);
                }, index * delay);
            });
        };

        urlsTextarea.oninput = updateStats;
        clearBtn.onclick = () => { urlsTextarea.value = ''; updateStats(); };
        exampleBtn.onclick = () => {
            urlsTextarea.value = "https://eliana.lol\nhttps://github.com/jubilancy\nhttps://j3s.sh";
            updateStats();
        };
    </script>
</body>
</html>
