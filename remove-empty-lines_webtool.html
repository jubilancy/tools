<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Empty Lines | tools.eliana.lol</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="global.css">

    <style>
        textarea {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>

<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                tools.eliana.lol
            </a>
            <div class="flex items-center gap-6">
                <ul class="hidden md:flex space-x-6 text-sm font-medium text-slate-500 dark:text-slate-400">
                    <li><a href="index.html" class="hover:text-blue-500 transition-colors">home</a></li>
                    <li><a href="rss-page.html" class="hover:text-blue-500 transition-colors">rss</a></li>
                    <li><a href="url-list-cleaner.html" class="hover:text-blue-500 transition-colors">url cleaner</a></li>
                </ul>
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 transition-all">🌙</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-12 w-full">
        <h1 class="text-4xl font-extrabold mb-4">Remove Empty Lines</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">
            Clean up your text by removing all blank and whitespace-only lines.
        </p>

        <div class="grid gap-6">
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-[0.2em] opacity-50">Input Text</label>
                <textarea id="input" rows="8" placeholder="Paste your messy text here..." class="w-full p-4 bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl focus:border-blue-500 focus:ring-0 transition-all outline-none"></textarea>
            </div>

            <div class="flex flex-wrap gap-3">
                <button id="remove" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl transition shadow-lg shadow-blue-500/20 active:scale-95">
                    Remove Empty Lines
                </button>
                <button id="copy" class="bg-slate-200 dark:bg-slate-800 hover:opacity-80 font-bold px-6 py-3 rounded-xl transition active:scale-95">
                    Copy Result
                </button>
                <button id="clearAll" class="text-red-500 hover:bg-red-500/10 font-bold px-6 py-3 rounded-xl transition active:scale-95 border border-transparent hover:border-red-500/20">
                    Clear Everything
                </button>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-[0.2em] opacity-50">Result</label>
                <textarea id="output" rows="8" readonly placeholder="Cleaned text will appear here..." class="w-full p-4 bg-slate-50 dark:bg-slate-900/50 border-2 border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-0 transition-all outline-none"></textarea>
            </div>
        </div>
    </main>

    <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 py-12 text-center text-slate-500 text-xs">
        &copy; 2026 eliana.lol
    </footer>

    <script>
        // 1. Theme Logic
        const toggle = document.getElementById('theme-toggle');
        const initTheme = () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                toggle.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                toggle.textContent = '🌙';
            }
        };
        initTheme();
        toggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            toggle.textContent = isDark ? '☀️' : '🌙';
        });

        // 2. Tool Logic
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const removeBtn = document.getElementById('remove');
        const copyBtn = document.getElementById('copy');
        const clearBtn = document.getElementById('clearAll');

        removeBtn.addEventListener('click', () => {
            output.value = input.value
                .split(/\r?\n/)
                .filter(line => line.trim() !== '')
                .join('\n');
        });

        // Clear Function
        clearBtn.addEventListener('click', () => {
            input.value = '';
            output.value = '';
            const originalText = clearBtn.textContent;
            clearBtn.textContent = 'Cleared!';
            setTimeout(() => clearBtn.textContent = originalText, 1000);
        });

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        const originalText = copyBtn.textContent;
                        copyBtn.textContent = 'Copied!';
                        copyBtn.classList.add('bg-green-600', 'text-white');
                        setTimeout(() => {
                            copyBtn.textContent = originalText;
                            copyBtn.classList.remove('bg-green-600', 'text-white');
                        }, 2000);
                    });
            } else {
                input.select();
                document.execCommand('copy');
                alert('Copied!');
            }
        }

        copyBtn.addEventListener('click', () => {
            if (output.value) copyToClipboard(output.value);
        });
    </script>
</body>

</html>
