<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rough Sketch | tools.eliana.lol</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" type="image/x-icon" href="favicon.svg" />
  <script src="https://unpkg.com/roughjs/bundled/rough.js"></script>
  <style>
    .container { display: flex; flex-direction: column; gap: 1.5rem; }

    #canvas-wrap {
      position: relative;
      width: 100%;
      border: 1px solid var(--puny);
      background: var(--bg);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      cursor: crosshair;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .tool-btn {
      padding: 6px 12px;
      font-size: 0.8rem;
      border: 1px solid var(--puny);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-family: monospace;
    }

    .tool-btn:hover, .tool-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .input-label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: var(--puny); }

    input[type="range"] { width: 100%; padding: 0; }
    input[type="color"] { width: 100%; height: 32px; padding: 2px; border: 1px solid var(--puny); background: var(--bg); border-radius: 4px; cursor: pointer; }

    .shape-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    button {
      padding: 8px 14px;
      font-family: monospace;
      border: 1px solid var(--text);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    button:hover { background-color: var(--hover); border-color: var(--accent); }
    button.primary { border-color: var(--accent); color: var(--accent); font-weight: bold; }

    .status { padding: 0.75rem 1rem; margin: 0.5rem 0; display: none; font-size: 0.9rem; border-left: 3px solid var(--accent); background: rgba(255,102,0,0.08); color: var(--accent); }
    .status.show { display: block; }

    .info-box { padding: 0.75rem 1rem; background-color: var(--highlight); border-left: 3px solid var(--accent); font-size: 0.875rem; }

    select {
      font-family: monospace;
      padding: 6px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--puny);
      width: 100%;
    }
  </style>
</head>
<body>
  <nav>
    <div class="left">
      <a href="index.html">home</a> | <a href="extra.html">extra</a> |
      <a href="credits.html">credits</a> |
      <a href="changelog.html">logs</a>
    </div>
    <div class="right">
      <button id="theme-toggle">[theme]</button> |
      <a href="https://eliana.lol">site</a>
    </div>
  </nav>

  <main>
    <h1>Rough Sketch</h1>
    <p class="puny">draw shapes in a hand-sketched style. click and drag on the canvas.</p>

    <div class="container">
      <div>
        <span class="input-label" style="display:block;margin-bottom:0.5rem;">Shape</span>
        <div class="shape-grid">
          <button class="tool-btn active" onclick="setTool('rect', this)">□ rect</button>
          <button class="tool-btn" onclick="setTool('ellipse', this)">○ ellipse</button>
          <button class="tool-btn" onclick="setTool('line', this)">/ line</button>
          <button class="tool-btn" onclick="setTool('arc', this)">( arc</button>
          <button class="tool-btn" onclick="setTool('polygon', this)">△ polygon</button>
        </div>
      </div>

      <div class="controls">
        <div class="control-group">
          <label class="input-label">Stroke Color</label>
          <input type="color" id="strokeColor" value="#000000">
        </div>
        <div class="control-group">
          <label class="input-label">Fill Color</label>
          <input type="color" id="fillColor" value="#ff6600">
        </div>
        <div class="control-group">
          <label class="input-label">Roughness <span id="rough-val">1.5</span></label>
          <input type="range" id="roughness" min="0" max="5" step="0.1" value="1.5" oninput="document.getElementById('rough-val').textContent=this.value">
        </div>
        <div class="control-group">
          <label class="input-label">Stroke Width <span id="sw-val">2</span></label>
          <input type="range" id="strokeWidth" min="1" max="8" step="0.5" value="2" oninput="document.getElementById('sw-val').textContent=this.value">
        </div>
        <div class="control-group">
          <label class="input-label">Fill Style</label>
          <select id="fillStyle">
            <option value="hachure">hachure</option>
            <option value="solid">solid</option>
            <option value="zigzag">zigzag</option>
            <option value="cross-hatch">cross-hatch</option>
            <option value="dots">dots</option>
            <option value="dashed">dashed</option>
          </select>
        </div>
        <div class="control-group">
          <label class="input-label">Sides (polygon) <span id="sides-val">5</span></label>
          <input type="range" id="sides" min="3" max="10" step="1" value="5" oninput="document.getElementById('sides-val').textContent=this.value">
        </div>
      </div>

      <div id="canvas-wrap">
        <canvas id="sketch" height="400"></canvas>
      </div>

      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
        <button class="primary" onclick="downloadCanvas()">download png</button>
        <button onclick="clearCanvas()">clear</button>
        <button onclick="undoLast()">undo</button>
      </div>

      <div class="status" id="status"></div>
    </div>
  </main>

  <footer style="margin-top: 4rem; text-align: center" class="puny">
    © 2026 eliana.lol • <a href="credits.html">credits</a>
  </footer>

  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) {
      toggle.onclick = () => {
        const now = html.getAttribute('data-theme');
        const next = now === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
      };
    }
  </script>

  <script>
    const canvas = document.getElementById('sketch');
    const ctx = canvas.getContext('2d');
    let rc = rough.canvas(canvas);
    let tool = 'rect';
    let drawing = false;
    let startX, startY;
    let shapes = [];

    function resize() {
      const wrap = document.getElementById('canvas-wrap');
      canvas.width = wrap.clientWidth;
      redraw();
    }

    function setTool(name, btn) {
      tool = name;
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function getOptions() {
      return {
        roughness: parseFloat(document.getElementById('roughness').value),
        stroke: document.getElementById('strokeColor').value,
        strokeWidth: parseFloat(document.getElementById('strokeWidth').value),
        fill: document.getElementById('fillColor').value,
        fillStyle: document.getElementById('fillStyle').value,
      };
    }

    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    canvas.addEventListener('mousedown', e => { drawing = true; const p = getCanvasPos(e); startX = p.x; startY = p.y; });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getCanvasPos(e); startX = p.x; startY = p.y; }, { passive: false });

    canvas.addEventListener('mousemove', e => {
      if (!drawing) return;
      const p = getCanvasPos(e);
      redraw();
      drawPreview(startX, startY, p.x, p.y);
    });

    canvas.addEventListener('mouseup', e => {
      if (!drawing) return;
      drawing = false;
      const p = getCanvasPos(e);
      shapes.push({ tool, x1: startX, y1: startY, x2: p.x, y2: p.y, opts: getOptions(), sides: parseInt(document.getElementById('sides').value) });
      redraw();
    });

    canvas.addEventListener('touchend', e => {
      if (!drawing) return;
      drawing = false;
      const touch = e.changedTouches[0];
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const p = { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
      shapes.push({ tool, x1: startX, y1: startY, x2: p.x, y2: p.y, opts: getOptions(), sides: parseInt(document.getElementById('sides').value) });
      redraw();
    });

    function drawShape(s) {
      const { x1, y1, x2, y2, opts, sides } = s;
      const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
      const w = Math.abs(x2 - x1), h = Math.abs(y2 - y1);
      if (s.tool === 'rect') rc.rectangle(Math.min(x1,x2), Math.min(y1,y2), w, h, opts);
      else if (s.tool === 'ellipse') rc.ellipse(cx, cy, w, h, opts);
      else if (s.tool === 'line') rc.line(x1, y1, x2, y2, opts);
      else if (s.tool === 'arc') rc.arc(cx, cy, w, h, 0, Math.PI, false, opts);
      else if (s.tool === 'polygon') {
        const r = Math.min(w, h) / 2;
        const pts = Array.from({ length: sides }, (_, i) => {
          const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
          return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
        });
        rc.polygon(pts, opts);
      }
    }

    function drawPreview(x1, y1, x2, y2) {
      ctx.globalAlpha = 0.5;
      drawShape({ tool, x1, y1, x2, y2, opts: getOptions(), sides: parseInt(document.getElementById('sides').value) });
      ctx.globalAlpha = 1;
    }

    function redraw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      shapes.forEach(drawShape);
    }

    function clearCanvas() {
      shapes = [];
      redraw();
    }

    function undoLast() {
      shapes.pop();
      redraw();
      showStatus('undone');
    }

    function downloadCanvas() {
      const link = document.createElement('a');
      link.download = 'rough-sketch.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    function showStatus(msg) {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.classList.add('show');
      setTimeout(() => s.classList.remove('show'), 2000);
    }

    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
