<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remove Empty Lines | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .tool-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--puny);
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <nav>
      <div class="left">
        <a href="index.html">home</a> | 
        <a href="extra.html">extra</a> | 
        <a href="credits.html">credits</a> |
        <a href="changelog.html">logs</a>
      </div>
      <div class="right">
        <button id="theme-toggle">[theme]</button> |
        <a href="https://eliana.lol">site</a>
      </div>
    </nav>

    <main>
        <h1>Remove Empty Lines</h1>
        <p class="puny">Paste messy text below to strip out all blank and whitespace-only lines.</p>

        <div class="tool-layout">
            <div>
                <label>Input Text</label>
                <textarea id="input" rows="8" placeholder="Paste your messy text here..."></textarea>
            </div>

            <div class="action-bar">
                <button id="remove" style="border-color: var(--accent); font-weight: bold;">✨ Remove Lines</button>
                <button id="copy">Copy Result</button>
                <button id="clearAll" style="color: var(--accent); border-style: dashed;">Clear All</button>
            </div>

            <div>
                <label>Result</label>
                <textarea id="output" rows="8" readonly placeholder="Cleaned text will appear here..." style="background: var(--hover);"></textarea>
            </div>
        </div>
    </main>

    <footer style="margin-top: 4rem; text-align: center;" class="puny">
        © 2026 eliana.lol • <a href="credits.html">credits</a>
    </footer>

    <script>
        const html = document.documentElement;
        const toggle = document.getElementById('theme-toggle');
        const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        html.setAttribute('data-theme', saved);
        if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';

        if (toggle) {
            toggle.onclick = () => {
                const now = html.getAttribute('data-theme');
                const next = now === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
            };
        }
    </script>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const removeBtn = document.getElementById('remove');
        const copyBtn = document.getElementById('copy');
        const clearBtn = document.getElementById('clearAll');

        removeBtn.onclick = () => {
            output.value = input.value
                .split(/\r?\n/)
                .filter(line => line.trim() !== '')
                .join('\n');
        };

        clearBtn.onclick = () => {
            input.value = '';
            output.value = '';
            const originalText = clearBtn.innerText;
            clearBtn.innerText = 'Cleared!';
            setTimeout(() => clearBtn.innerText = originalText, 1000);
        };

        copyBtn.onclick = () => {
            if (!output.value) return;
            
            navigator.clipboard.writeText(output.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = 'Copied!';
                // Visual feedback using site colors
                copyBtn.style.backgroundColor = 'var(--highlight)';
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.backgroundColor = '';
                }, 1500);
            });
        };
    </script>
</body>
</html>
