<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strip HTML & Formatting | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="icon" type="image/x-icon" href="favicon.svg" />
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            line-height: 1.6;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .output-container {
            margin-top: 20px;
        }

        #charCount {
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>

<body>

    <h2>Strip HTML & Formatting</h2>
    <p>Paste your HTML text here (maximum 20,000 characters):</p>

    <textarea id="inputArea" maxlength="20000" placeholder="Paste content here..."></textarea>
    <div id="charCount">Characters: 0 / 20,000</div>
    <br>
    <button onclick="stripContent()">Strip HTML and Formatting</button>

    <div class="output-container">
        <h3>Result:</h3>
        <textarea id="outputArea" readonly placeholder="Cleaned text will appear here..."></textarea>
    </div>

    <script>
        const inputArea = document.getElementById('inputArea');
        const charCount = document.getElementById('charCount');

        inputArea.addEventListener('input', () => {
            charCount.textContent = `Characters: ${inputArea.value.length} / 20,000`;
        });

        function stripContent() {
            const input = inputArea.value;

            // Create a temporary element to handle HTML entity decoding
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = input;
            let text = tempDiv.textContent || tempDiv.innerText || "";

            // Remove any remaining HTML tags using Regex
            text = text.replace(/<[^>]*>?/gm, '');

            document.getElementById('outputArea').value = text.trim();
        }
    </script>

</body>

</html>
