<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Name | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>

    <nav>
      <div class="left">
        <a href="index.html">home</a> | 
        <a href="extra.html">extra</a> | 
        <a href="credits.html">credits</a> |
        <a href="changelog.html">logs</a>
      </div>
      <div class="right">
        <button id="theme-toggle">[theme]</button> |
        <a href="https://eliana.lol">site</a>
      </div>
    </nav>

    <main>
        <h1>Tool Name</h1>
        <p class="puny">Replace this description with what your tool does.</p>

        <div id="tool-content">
            <textarea id="input" rows="10" placeholder="Input..."></textarea>
            <button id="run-btn">Run Tool</button>
            <textarea id="output" rows="10" readonly placeholder="Output..."></textarea>
        </div>
    </main>

    <script>
        const html = document.documentElement;
        const toggle = document.getElementById('theme-toggle');

        // Set initial theme
        const saved = localStorage.getItem('theme') || 
                     (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        html.setAttribute('data-theme', saved);
        if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';

        // Toggle function
        if (toggle) {
            toggle.onclick = () => {
                const now = html.getAttribute('data-theme');
                const next = now === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
            };
        }
    </script>

    <script>
        // Example logic:
        document.getElementById('run-btn').onclick = () => {
            const val = document.getElementById('input').value;
            document.getElementById('output').value = val.trim();
        };
    </script>

</body>
</html>
