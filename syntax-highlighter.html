<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Syntax Highlighter | tools.eliana.lol</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" type="image/x-icon" href="favicon.svg" />
  <!-- Prism core + themes + languages -->
  <link id="prism-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" />
  <style>
    .container { display: flex; flex-direction: column; gap: 1.5rem; }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .input-label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: var(--puny); }

    select {
      font-family: monospace;
      padding: 6px 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--puny);
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--accent); }

    #code-input {
      width: 100%;
      min-height: 200px;
      font-family: monospace;
      font-size: 0.875rem;
      padding: 12px;
      border: 1px solid var(--puny);
      background: var(--bg);
      color: var(--text);
      box-sizing: border-box;
      resize: vertical;
      tab-size: 2;
      line-height: 1.6;
    }
    #code-input:focus { outline: none; border-color: var(--accent); }

    .output-wrap {
      position: relative;
      border: 1px solid var(--puny);
    }

    .output-wrap pre {
      margin: 0 !important;
      border-radius: 0 !important;
      font-size: 0.875rem !important;
    }

    .copy-overlay {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
    }

    /* Override Prism themes with CSS vars where possible */
    .prism-light { background: #f5f2f0 !important; }
    .prism-dark { background: #1c1c1c !important; }

    button {
      padding: 6px 12px;
      font-family: monospace;
      font-size: 0.85rem;
      border: 1px solid var(--text);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    button:hover { background: var(--hover); border-color: var(--accent); }
    button.primary { border-color: var(--accent); color: var(--accent); font-weight: bold; }

    .status { padding: 0.75rem 1rem; margin: 0.5rem 0; display: none; font-size: 0.9rem; border-left: 3px solid var(--accent); background: rgba(255,102,0,0.08); color: var(--accent); }
    .status.show { display: block; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    input[type="checkbox"] { width: auto; padding: 0; cursor: pointer; }

    .info-box { padding: 0.75rem 1rem; background-color: var(--highlight); border-left: 3px solid var(--accent); font-size: 0.875rem; }

    .embed-code {
      background: var(--highlight);
      border: 1px dashed var(--accent);
      padding: 1rem;
      font-size: 0.75rem;
      white-space: pre;
      overflow-x: auto;
      display: none;
    }
    .embed-code.show { display: block; }
  </style>
</head>
<body>
  <nav>
    <div class="left">
      <a href="index.html">home</a> | <a href="extra.html">extra</a> |
      <a href="credits.html">credits</a> |
      <a href="changelog.html">logs</a>
    </div>
    <div class="right">
      <button id="theme-toggle">[theme]</button> |
      <a href="https://eliana.lol">site</a>
    </div>
  </nav>

  <main>
    <h1>Syntax Highlighter</h1>
    <p class="puny">paste code, pick a language and theme — copy the highlighted html to embed anywhere.</p>

    <div class="container">
      <div class="top-row">
        <div>
          <div class="input-label" style="margin-bottom:4px;">Language</div>
          <select id="lang" onchange="highlight()">
            <option value="javascript">javascript</option>
            <option value="typescript">typescript</option>
            <option value="python">python</option>
            <option value="css">css</option>
            <option value="markup">html / xml</option>
            <option value="bash">bash / shell</option>
            <option value="json">json</option>
            <option value="rust">rust</option>
            <option value="go">go</option>
            <option value="sql">sql</option>
            <option value="yaml">yaml</option>
            <option value="markdown">markdown</option>
          </select>
        </div>
        <div>
          <div class="input-label" style="margin-bottom:4px;">Theme</div>
          <select id="theme-sel" onchange="setTheme(this.value)">
            <option value="prism">default (light)</option>
            <option value="prism-dark">dark</option>
            <option value="prism-okaidia">okaidia</option>
            <option value="prism-tomorrow">tomorrow night</option>
            <option value="prism-solarizedlight">solarized light</option>
            <option value="prism-twilight">twilight</option>
            <option value="prism-coy">coy</option>
          </select>
        </div>
        <div class="toggle-row" style="align-self:flex-end;padding-bottom:2px;">
          <input type="checkbox" id="line-nums" onchange="highlight()">
          <label for="line-nums">line numbers</label>
        </div>
      </div>

      <div>
        <div class="input-label" style="margin-bottom:4px;">Paste code</div>
        <textarea id="code-input" spellcheck="false" oninput="highlight()" placeholder="// paste your code here"></textarea>
      </div>

      <div>
        <div class="input-label" style="margin-bottom:4px;">Result</div>
        <div class="output-wrap">
          <div class="copy-overlay">
            <button onclick="copyHighlighted()">copy</button>
          </div>
          <div id="output"></div>
        </div>
      </div>

      <div class="toolbar">
        <button class="primary" onclick="copyHighlighted()">copy highlighted html</button>
        <button onclick="toggleEmbed()">show embed snippet</button>
        <button onclick="loadExample()">load example</button>
      </div>

      <div class="embed-code" id="embed-code"></div>

      <div class="status" id="status"></div>
    </div>
  </main>

  <footer style="margin-top: 4rem; text-align: center" class="puny">
    © 2026 eliana.lol • <a href="credits.html">credits</a>
  </footer>

  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => {
      const next = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      htmlEl.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
    };
  </script>

  <script>
    const themeBase = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/';
    const themeMap = {
      'prism': 'prism.min.css',
      'prism-dark': 'prism-dark.min.css',
      'prism-okaidia': 'prism-okaidia.min.css',
      'prism-tomorrow': 'prism-tomorrow.min.css',
      'prism-solarizedlight': 'prism-solarizedlight.min.css',
      'prism-twilight': 'prism-twilight.min.css',
      'prism-coy': 'prism-coy.min.css',
    };

    function setTheme(name) {
      document.getElementById('prism-theme').href = themeBase + themeMap[name];
      highlight();
    }

    function highlight() {
      const code = document.getElementById('code-input').value;
      const lang = document.getElementById('lang').value;
      const lineNums = document.getElementById('line-nums').checked;

      const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const preClass = lineNums ? 'class="line-numbers"' : '';
      const html = `<pre ${preClass}><code class="language-${lang}">${escaped}</code></pre>`;
      document.getElementById('output').innerHTML = html;
      Prism.highlightAll();
    }

    function copyHighlighted() {
      const out = document.getElementById('output').innerHTML;
      navigator.clipboard.writeText(out);
      showStatus('highlighted html copied!');
    }

    function toggleEmbed() {
      const ec = document.getElementById('embed-code');
      const theme = document.getElementById('theme-sel').value;
      const lang = document.getElementById('lang').value;
      ec.textContent = `<link rel="stylesheet" href="${themeBase}${themeMap[theme]}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-${lang}.min.js"><\/script>

<pre><code class="language-${lang}">
  // your code here
</code></pre>`;
      ec.classList.toggle('show');
    }

    function loadExample() {
      document.getElementById('code-input').value = `// fetch wrapper with error handling
async function apiFetch(url, options = {}) {
  const defaults = {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  };

  const res = await fetch(url, defaults);

  if (!res.ok) {
    throw new Error(\`HTTP \${res.status}: \${res.statusText}\`);
  }

  return res.json();
}

// Usage
apiFetch('/api/users')
  .then(data => console.log(data))
  .catch(err => console.error(err));`;
      highlight();
    }

    function showStatus(msg) {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.classList.add('show');
      setTimeout(() => s.classList.remove('show'), 2000);
    }

    loadExample();
  </script>
</body>
</html>
