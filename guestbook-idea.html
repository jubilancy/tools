<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook | tools.eliana.lol</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="global.css">

    <style>
        /* 2. Tool-Specific Styles (Cleaned up from the original) */
        :root {
            --gb-paper: #ffffff;
            --gb-pen: #000000;
        }

        .dark :root {
            --gb-paper: #1e293b;
            --gb-pen: #f8fafc;
        }

        .guestbook-container {
            max-width: 600px;
            margin: 0 auto;
        }

        canvas {
            border: 2px solid #334155;
            background: var(--gb-paper);
            cursor: crosshair;
            touch-action: none;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(51, 65, 85, 0.1);
            border-radius: 8px;
        }

        .tool-btn {
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tool-btn.active {
            background: #3b82f6;
            color: white;
        }

        .hidden {
            display: none;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            background: rgba(51, 65, 85, 0.1);
            border: 1px solid #334155;
            border-radius: 6px;
            margin-top: 5px;
            color: inherit;
        }
    </style>
</head>

<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-full mx-auto px-6 py-3 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                tools.eliana.lol
            </a>
            <div class="flex items-center gap-6">
                <ul class="flex space-x-6 text-sm font-medium">
                    <li><a href="index.html" class="hover:text-blue-400">home</a></li>
                    <li><a href="guestbook.html" class="text-blue-400">guestbook</a></li>
                </ul>
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800">🌙</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-6">
        <div class="guestbook-container">
            <h1 class="text-3xl font-bold mb-2">Sign the Guestbook</h1>
            <p class="text-slate-500 mb-8 text-sm">Leave a little drawing or a note.</p>

            <div class="flex gap-4 mb-6 p-1 bg-slate-100 dark:bg-slate-900 rounded-lg w-fit">
                <button id="btn-draw" class="px-4 py-2 rounded-md text-sm font-bold bg-white dark:bg-slate-800 shadow-sm transition-all">Draw</button>
                <button id="btn-write" class="px-4 py-2 rounded-md text-sm font-bold text-slate-500 hover:text-slate-900 dark:hover:text-white transition-all">Write</button>
            </div>

            <form id="gb-form">
                <div id="section-draw">
                    <div class="toolbar items-center justify-between">
                        <div class="flex gap-2">
                            <button type="button" id="tool-pen" class="tool-btn active" title="Pen">✏️</button>
                            <button type="button" id="tool-eraser" class="tool-btn" title="Eraser">🧽</button>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" id="tool-undo" class="tool-btn">↩️ Undo</button>
                            <button type="button" id="tool-clear" class="tool-btn text-red-500">🗑️</button>
                        </div>
                    </div>
                    <canvas id="drawingCanvas" width="500" height="500"></canvas>
                </div>

                <div id="section-write" class="hidden">
                    <label class="text-sm font-bold">Your message</label>
                    <textarea rows="8" placeholder="Type something nice..."></textarea>
                </div>

                <div class="mt-6 space-y-4">
                    <div>
                        <label class="text-sm font-bold">Your Name</label>
                        <input type="text" required placeholder="Eliana">
                    </div>
                    <div>
                        <label class="text-sm font-bold">Website (optional)</label>
                        <input type="url" placeholder="https://eliana.lol">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-4 transition-all">
                        Sign Guestbook
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // 1. Theme Logic
        const toggle = document.getElementById('theme-toggle');
        const updateThemeUI = (isDark) => {
            document.documentElement.classList.toggle('dark', isDark);
            toggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.theme = isDark ? 'dark' : 'light';
        };

        const initTheme = () => {
            const isDark = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            updateThemeUI(isDark);
        };
        initTheme();

        toggle.addEventListener('click', () => {
            const isDark = !document.documentElement.classList.contains('dark');
            updateThemeUI(isDark);
        });

        // 2. Section Swapper
        const btnDraw = document.getElementById('btn-draw');
        const btnWrite = document.getElementById('btn-write');
        const secDraw = document.getElementById('section-draw');
        const secWrite = document.getElementById('section-write');

        btnDraw.onclick = () => {
            secDraw.classList.remove('hidden');
            secWrite.classList.add('hidden');
            btnDraw.classList.add('bg-white', 'dark:bg-slate-800');
            btnWrite.classList.remove('bg-white', 'dark:bg-slate-800');
        };
        btnWrite.onclick = () => {
            secWrite.classList.remove('hidden');
            secDraw.classList.add('hidden');
            btnWrite.classList.add('bg-white', 'dark:bg-slate-800');
            btnDraw.classList.remove('bg-white', 'dark:bg-slate-800');
        };

        // 3. FIXED Drawing Logic
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let isEraser = false;

        // Helper to get correct coordinates
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startPosition(e) {
            painting = true;
            ctx.beginPath(); // Start a fresh path
            const {
                x,
                y
            } = getCoords(e);
            ctx.moveTo(x, y);
            e.preventDefault(); // Prevent scrolling while drawing
        }

        function finishedPosition() {
            painting = false;
        }

        function draw(e) {
            if (!painting) return;

            const {
                x,
                y
            } = getCoords(e);
            const isDark = document.documentElement.classList.contains('dark');

            // Set Styles
            ctx.lineWidth = isEraser ? 30 : 3;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            if (isEraser) {
                ctx.strokeStyle = isDark ? "#1e293b" : "#ffffff"; // Matches paper color
            } else {
                ctx.strokeStyle = isDark ? "#f8fafc" : "#000000"; // Matches pen color
            }

            ctx.lineTo(x, y);
            ctx.stroke();
        }

        // Event Listeners
        canvas.addEventListener('mousedown', startPosition);
        window.addEventListener('mouseup', finishedPosition); // Window level for smoother release
        canvas.addEventListener('mousemove', draw);

        // Touch Support
        canvas.addEventListener('touchstart', startPosition, {
            passive: false
        });
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', draw, {
            passive: false
        });

        // Tool Buttons
        document.getElementById('tool-pen').onclick = function() {
            isEraser = false;
            this.classList.add('active');
            document.getElementById('tool-eraser').classList.remove('active');
        };
        document.getElementById('tool-eraser').onclick = function() {
            isEraser = true;
            this.classList.add('active');
            document.getElementById('tool-pen').classList.remove('active');
        };
        document.getElementById('tool-clear').onclick = () => {
            if (confirm("Clear drawing?")) ctx.clearRect(0, 0, canvas.width, canvas.height);
        };
    </script>
</body>

</html>
