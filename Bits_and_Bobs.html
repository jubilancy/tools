<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bits + Bobs | tools.eliana.lol</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" type="image/x-icon" href="favicon.svg" />
  <style>
    .container { display: flex; flex-direction: column; gap: 1.5rem; }
    .input-label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: var(--puny); letter-spacing: 0.05em; display: block; margin-bottom: 0.4rem; }
    .button-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    button { font-family: monospace; padding: 8px 14px; cursor: pointer; background: var(--bg); color: var(--text); border: 1px solid var(--text); font-size: 0.85rem; }
    button.primary { border-color: var(--accent); color: var(--accent); font-weight: bold; }
    button.success { border-color: #4caf50; color: #4caf50; }
    button:hover { background-color: var(--hover); }
    textarea { min-height: 130px; resize: vertical; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--puny); font-family: monospace; padding: 6px 8px; }
    label { font-size: 0.85rem; color: var(--puny); }
    .tool-panel { border: 1px solid var(--puny); padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .tool-panel h3 { font-size: 0.9rem; text-transform: uppercase; margin: 0; }
    .row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .stats { font-size: 0.78rem; color: var(--puny); }
    .status { font-size: 0.83rem; color: var(--accent); min-height: 1.2em; }
    input[type="checkbox"] { accent-color: var(--accent); }
  </style>
</head>
<body>
  <nav>
    <div class="left">
      <a href="index.html">home</a> | <a href="extra.html">extra</a> |
      <a href="credits.html">credits</a> |
      <a href="changelog.html">logs</a>
    </div>
    <div class="right">
      <button id="theme-toggle">[theme]</button> |
      <a href="https://eliana.lol">site</a>
    </div>
  </nav>

  <main>
    <h1>Bits + Bobs</h1>
    <p class="puny">A small set of text manipulation utilities — link splitting, joining, and image formatting.</p>

    <div class="container">

      <div>
        <span class="input-label">Input</span>
        <textarea id="input" placeholder="Paste your raw links or text here..."></textarea>
      </div>

      <div class="tool-panel">
        <h3>1. Link Splitter / Text Joiner</h3>
        <div class="row">
          <button onclick="splitLinks()">Split by Comma / Semicolon</button>
          <button onclick="joinLinks()">Join lines with Comma</button>
          <button onclick="dedupeLines()">Deduplicate Lines</button>
          <button onclick="sortLines()">Sort A→Z</button>
        </div>
      </div>

      <div class="tool-panel">
        <h3>2. Image & Grid Formatter</h3>
        <div class="row">
          <label>Format:</label>
          <select id="format">
            <option value="wiki">Wiki (![[]])</option>
            <option value="markdown">Markdown (![]())</option>
            <option value="html">HTML (&lt;img&gt;)</option>
          </select>
          <input type="checkbox" id="galleryMode" />
          <label for="galleryMode">Grid spacing (no newlines)</label>
          <button class="primary" onclick="formatImages()">Format Images</button>
        </div>
      </div>

      <div>
        <span class="input-label">Output</span>
        <textarea id="output" readonly placeholder="Result appears here..."></textarea>
        <div class="row" style="margin-top: 0.5rem;">
          <button class="success" onclick="copyOutput()">Copy to Clipboard</button>
          <button onclick="swapIO()">↕ Swap Input/Output</button>
          <button onclick="clearAll()">Clear</button>
          <span class="stats" id="count"></span>
        </div>
        <div class="status" id="status"></div>
      </div>

    </div>
  </main>

  <footer style="margin-top: 4rem; text-align: center" class="puny">
    © 2026 eliana.lol • <a href="credits.html">credits</a>
  </footer>

  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => {
      const now = htmlEl.getAttribute('data-theme');
      const next = now === 'dark' ? 'light' : 'dark';
      htmlEl.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
    };
  </script>

  <script>
    const getInput = () => document.getElementById('input').value;
    const setOutput = (val, count) => {
      document.getElementById('output').value = val;
      document.getElementById('count').textContent = `${count} item${count !== 1 ? 's' : ''}`;
    };

    function splitLinks() {
      const split = getInput().split(/[,;]|\s{2,}/).map(i => i.trim()).filter(Boolean);
      setOutput(split.join('\n'), split.length);
      showStatus('Split!');
    }
    function joinLinks() {
      const lines = getInput().split(/\r?\n/).map(i => i.trim()).filter(Boolean);
      setOutput(lines.join(', '), lines.length);
      showStatus('Joined!');
    }
    function dedupeLines() {
      const lines = [...new Set(getInput().split(/\r?\n/).map(i => i.trim()).filter(Boolean))];
      setOutput(lines.join('\n'), lines.length);
      showStatus(`Deduplicated — ${lines.length} unique lines`);
    }
    function sortLines() {
      const lines = getInput().split(/\r?\n/).map(i => i.trim()).filter(Boolean).sort((a,b) => a.localeCompare(b));
      setOutput(lines.join('\n'), lines.length);
      showStatus('Sorted!');
    }
    function formatImages() {
      const format = document.getElementById('format').value;
      const isGrid = document.getElementById('galleryMode').checked;
      const lines = getInput().split(/\r?\n/).filter(l => l.trim());
      const sep = isGrid ? ' ' : '\n';
      const formatted = lines.map(link => {
        const url = link.trim();
        if (format === 'wiki') return `![[${url}]]`;
        if (format === 'markdown') return `![](${url})`;
        if (format === 'html') return `<img src="${url}" alt="" />`;
      }).join(sep);
      setOutput(formatted, lines.length);
      showStatus(`Formatted ${lines.length} images as ${format}`);
    }
    function copyOutput() {
      const out = document.getElementById('output').value;
      if (!out) { showStatus('Nothing to copy.'); return; }
      navigator.clipboard.writeText(out).then(() => showStatus('✓ Copied!'));
    }
    function swapIO() {
      const i = document.getElementById('input').value;
      const o = document.getElementById('output').value;
      document.getElementById('input').value = o;
      document.getElementById('output').value = i;
    }
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('count').textContent = '';
    }
    function showStatus(msg) {
      const s = document.getElementById('status');
      s.textContent = msg;
      setTimeout(() => s.textContent = '', 2500);
    }
  </script>
</body>
</html>
