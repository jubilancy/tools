<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reactive Components | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 24px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    .card { border: 1px solid var(--puny); padding: 14px; }
    .card h2 { font-size: 0.9rem; text-transform: uppercase; margin: 0 0 12px 0; padding-bottom: 6px; border-bottom: 1px solid var(--puny); }
    [x-cloak] { display: none !important; }
    .todo-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--puny); font-size: 0.9rem; }
    .todo-item.done span { text-decoration: line-through; color: var(--puny); }
    .count-display { font-size: 3rem; font-weight: bold; text-align: center; padding: 10px; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 12px; }
    .tab { border: 1px solid var(--puny); padding: 4px 12px; cursor: pointer; font-size: 0.8rem; }
    .tab.active { background: var(--highlight); }
    .search-result { padding: 6px 0; border-bottom: 1px solid var(--puny); font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>Reactive Components</h1>
    <p class="puny">Live demos of Alpine.js — reactive UI with zero build step.</p>
    <div class="tool-layout">

      <!-- Counter -->
      <div class="card" x-data="{ count: 0, step: 1 }">
        <h2>Counter</h2>
        <div class="count-display" x-text="count"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button @click="count -= step">− <span x-text="step"></span></button>
          <button @click="count = 0">Reset</button>
          <button @click="count += step">+ <span x-text="step"></span></button>
          <label style="display:inline-flex;align-items:center;gap:6px;text-transform:none;font-weight:normal;color:var(--text)">
            Step: <input type="number" x-model.number="step" style="width:60px" min="1" />
          </label>
        </div>
      </div>

      <!-- Todo list -->
      <div class="card" x-data="{
        todos: [{text:'Learn Alpine.js', done:true},{text:'Build a tool',done:false},{text:'Ship it',done:false}],
        newTodo: '',
        filter: 'all',
        get filtered() {
          if (this.filter==='active') return this.todos.filter(t=>!t.done);
          if (this.filter==='done') return this.todos.filter(t=>t.done);
          return this.todos;
        },
        add() { if(this.newTodo.trim()) { this.todos.push({text:this.newTodo.trim(),done:false}); this.newTodo=''; } },
        remove(i) { this.todos.splice(this.todos.indexOf(i),1); }
      }">
        <h2>Todo list <span class="puny" x-text="'(' + todos.filter(t=>!t.done).length + ' left)'"></span></h2>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <input type="text" x-model="newTodo" placeholder="Add a task…" @keydown.enter="add()" style="flex:1" />
          <button @click="add()">Add</button>
        </div>
        <div class="tab-bar">
          <div class="tab" :class="filter==='all'?'active':''" @click="filter='all'">All</div>
          <div class="tab" :class="filter==='active'?'active':''" @click="filter='active'">Active</div>
          <div class="tab" :class="filter==='done'?'active':''" @click="filter='done'">Done</div>
        </div>
        <template x-for="todo in filtered" :key="todo.text">
          <div class="todo-item" :class="todo.done?'done':''">
            <input type="checkbox" x-model="todo.done" />
            <span x-text="todo.text" style="flex:1"></span>
            <button @click="remove(todo)" style="padding:2px 8px;font-size:0.75rem">✕</button>
          </div>
        </template>
        <p x-show="filtered.length===0" class="puny" style="font-size:0.85rem;margin-top:8px">Nothing here.</p>
      </div>

      <!-- Live filter -->
      <div class="card" x-data="{
        query: '',
        items: ['Alpine.js','Tailwind CSS','Vite','SvelteKit','Astro','Remix','Solid.js','Qwik','Preact','Lit','Stencil','Marko','Fresh','Enhance','Lume'],
        get results() { return this.query ? this.items.filter(i=>i.toLowerCase().includes(this.query.toLowerCase())) : this.items; }
      }">
        <h2>Live filter</h2>
        <input type="text" x-model="query" placeholder="Filter frameworks…" />
        <p class="puny" style="font-size:0.8rem;margin:6px 0" x-text="results.length + ' result' + (results.length!==1?'s':'')"></p>
        <template x-for="item in results" :key="item">
          <div class="search-result" x-text="item"></div>
        </template>
        <p x-show="results.length===0" class="puny" style="font-size:0.85rem">No matches.</p>
      </div>

    </div>
  </main>
  <footer style="margin-top: 4rem; text-align: center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = htmlEl.getAttribute('data-theme'); const next = now === 'dark' ? 'light' : 'dark'; htmlEl.setAttribute('data-theme', next); localStorage.setItem('theme', next); toggle.innerText = next === 'dark' ? '[light]' : '[dark]'; };
  </script>
</body>
</html>
