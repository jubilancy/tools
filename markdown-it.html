  <!-- mdurl: inlined UMD shim -->
  <script>
    const mdurl = (function () {
      const CACHE = {}
      function getCache(exclude) {
        if (CACHE[exclude]) return CACHE[exclude]
        const c = CACHE[exclude] = []
        for (let i = 0; i < 128; i++) {
          const ch = String.fromCharCode(i)
          c.push(/^[A-Za-z0-9\-_.!~*'()]$/.test(ch) ? ch : encodeURIComponent(ch))
        }
        for (let i = 0; i < exclude.length; i++) c[exclude.charCodeAt(i)] = exclude[i]
        return c
      }
      function encode(str, exclude, keepEncoded) {
        if (typeof exclude !== 'string') { keepEncoded = exclude; exclude = ";/?:@&=+$,-_.!~*'()#" }
        if (keepEncoded === undefined) keepEncoded = false
        const c = getCache(exclude)
        let out = ''
        for (let i = 0; i < str.length; i++) {
          const code = str.charCodeAt(i)
          if (keepEncoded && code === 0x25 && i + 2 < str.length && /^[0-9a-f]{2}$/i.test(str.slice(i+1, i+3))) {
            out += str.slice(i, i+3); i += 2; continue
          }
          if (code < 128) { out += c[code]; continue }
          if (code >= 0xD800 && code <= 0xDBFF && i + 1 < str.length) {
            const next = str.charCodeAt(i + 1)
            if (next >= 0xDC00 && next <= 0xDFFF) { out += encodeURIComponent(str[i] + str[i+1]); i++; continue }
          }
          out += (code >= 0xD800 && code <= 0xDFFF) ? '%EF%BF%BD' : encodeURIComponent(str[i])
        }
        return out
      }
      function decode(str) {
        try { return decodeURIComponent(str) } catch (_) { return str }
      }
      decode.componentChars = "-_.!~*'()"
      return { encode, decode }
    }())
  </script>

  <script>
    // ── Theme toggle ────────────────────────────────────────────────────
    const htmlEl = document.documentElement
    const toggle = document.getElementById('theme-toggle')
    const saved  = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')

    function applyTheme(t) {
      htmlEl.setAttribute('data-theme', t)
      localStorage.setItem('theme', t)
      if (toggle) toggle.innerText = t === 'dark' ? '[light]' : '[dark]'
      document.getElementById('hljs-theme-light').disabled = (t === 'dark')
      document.getElementById('hljs-theme-dark').disabled  = (t !== 'dark')
    }
    applyTheme(saved)
    if (toggle) toggle.onclick = () =>
      applyTheme(htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')
  </script>

  <script>
    // ── Guards ──────────────────────────────────────────────────────────
    const missing = []
    if (typeof markdownit === 'undefined') missing.push('markdown-it')
    if (typeof hljs === 'undefined')       missing.push('highlight.js')
    if (typeof _ === 'undefined')          missing.push('lodash')
    if (missing.length) {
      document.querySelector('.editor-wrap').innerHTML =
        '<div style="padding:2rem;color:#ef4444;">Failed to load: ' +
        missing.join(', ') + '. Check your connection and reload.</div>'
    }

    // ── State ───────────────────────────────────────────────────────────
    const opts = {
      html: false, breaks: false, linkify: true,
      typographer: true, highlight: true, math: true, strict: false
    }

    let mdHtml, mdSrc, currentView = 'html', scrollMap = null

    // ── Build markdown-it ───────────────────────────────────────────────
    function safeUse(md, plugin, opt) {
      if (typeof plugin !== 'function') return md
      try { return opt !== undefined ? md.use(plugin, opt) : md.use(plugin) }
      catch (e) { console.warn('Plugin failed:', e); return md }
    }

    function initMd() {
      const emojiPlugin = window.markdownitEmoji
        ? (window.markdownitEmoji.full || window.markdownitEmoji) : null
      const katexPlugin = window.markdownitKatex || null

      const mdOpts = {
        html: opts.html, breaks: opts.breaks, linkify: opts.linkify,
        typographer: opts.typographer, langPrefix: 'language-',
        highlight(str, lang) {
          if (!opts.highlight)
            return '<pre><code>' + mdHtml.utils.escapeHtml(str) + '</code></pre>'
          try {
            if (lang && hljs.getLanguage(lang))
              return '<pre><code class="hljs language-' + lang + '">' +
                hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                '</code></pre>'
          } catch (_) {}
          return '<pre><code class="hljs">' + mdHtml.utils.escapeHtml(str) + '</code></pre>'
        }
      }

      function build() {
        if (opts.strict) return window.markdownit('commonmark')
        let md = window.markdownit(mdOpts)
        md = safeUse(md, window.markdownitAbbr)
        md = safeUse(md, window.markdownitContainer, 'warning')
        md = safeUse(md, window.markdownitDeflist)
        md = safeUse(md, emojiPlugin)
        md = safeUse(md, window.markdownitFootnote)
        md = safeUse(md, window.markdownitIns)
        md = safeUse(md, window.markdownitMark)
        md = safeUse(md, window.markdownitSub)
        md = safeUse(md, window.markdownitSup)
        md = safeUse(md, window.markdownitTaskLists, { enabled: true })
        if (opts.math && katexPlugin) md = safeUse(md, katexPlugin)
        return md
      }

      mdHtml = build()
      mdSrc  = build()

      if (window.twemoji && mdHtml.renderer.rules.emoji) {
        mdHtml.renderer.rules.emoji = (token, idx) =>
          window.twemoji.parse(token[idx].content)
      }

      function injectLine(tokens, idx, options, env, slf) {
        if (tokens[idx].map && tokens[idx].level === 0) {
          tokens[idx].attrJoin('class', 'line')
          tokens[idx].attrSet('data-line', String(tokens[idx].map[0]))
        }
        return slf.renderToken(tokens, idx, options, env, slf)
      }
      mdHtml.renderer.rules.paragraph_open =
      mdHtml.renderer.rules.heading_open = injectLine
    }

    // ── Render ──────────────────────────────────────────────────────────
    function render() {
      const src  = document.getElementById('source').value
      const pane = document.getElementById('result-pane')
      document.getElementById('char-count').textContent = src.length + ' chars'

      if (currentView === 'html') {
        pane.innerHTML = mdHtml.render(src)
      } else if (currentView === 'src') {
        const html = mdSrc.render(src)
        pane.textContent = ''
        if (window.hljs) {
          pane.innerHTML = hljs.highlight(html, { language: 'html' }).value
        } else {
          pane.textContent = html
        }
      } else {
        const parsed = JSON.stringify(mdSrc.parse(src, { references: {} }), null, 2)
        if (window.hljs) {
          pane.innerHTML = hljs.highlight(parsed, { language: 'json' }).value
        } else {
          pane.textContent = parsed
        }
      }

      scrollMap = null
      updatePermalink(src)
    }

    // ── Permalink ───────────────────────────────────────────────────────
    function updatePermalink(src) {
      try {
        const btn = document.getElementById('permalink-btn')
        if (src) {
          btn.href = '#md3=' + mdurl.encode(
            JSON.stringify({ source: src, opts: { ...opts } }), '-_.!~', false)
        } else {
          btn.href = ''
        }
      } catch (_) {}
    }

    function loadPermalink() {
      if (!location.hash) return
      try {
        let cfg
        if      (/^#md3=/.test(location.hash)) cfg = JSON.parse(mdurl.decode(location.hash.slice(5), mdurl.decode.componentChars))
        else if (/^#md=/.test(location.hash))  cfg = JSON.parse(decodeURIComponent(location.hash.slice(4)))
        else return
        if (cfg.source) document.getElementById('source').value = cfg.source
        if (cfg.opts)   Object.assign(opts, cfg.opts)
      } catch (_) {}
    }

    // ── Scroll sync ─────────────────────────────────────────────────────
    function buildScrollMap() {
      const ta  = document.getElementById('source')
      const res = document.getElementById('result-pane')
      const div = document.createElement('div')
      Object.assign(div.style, {
        position: 'absolute', visibility: 'hidden', height: 'auto',
        width: ta.clientWidth + 'px',
        fontSize: getComputedStyle(ta).fontSize,
        fontFamily: getComputedStyle(ta).fontFamily,
        lineHeight: getComputedStyle(ta).lineHeight,
        whiteSpace: getComputedStyle(ta).whiteSpace
      })
      document.body.appendChild(div)
      const offset = res.getBoundingClientRect().top - res.scrollTop
      const map = [], nonEmpty = [], lineHMap = []
      let acc = 0
      ta.value.split('\n').forEach(str => {
        lineHMap.push(acc)
        if (!str.length) { acc++; return }
        div.textContent = str
        const lh = parseFloat(getComputedStyle(div).lineHeight)
        acc += Math.round(parseFloat(getComputedStyle(div).height) / lh)
      })
      div.remove()
      lineHMap.push(acc)
      for (let i = 0; i < acc; i++) map.push(-1)
      nonEmpty.push(0); map[0] = 0
      res.querySelectorAll('.line').forEach(el => {
        let t = parseInt(el.dataset.line)
        if (isNaN(t)) return
        t = lineHMap[t]
        if (t !== 0) nonEmpty.push(t)
        map[t] = Math.round(el.getBoundingClientRect().top - offset + res.scrollTop)
      })
      nonEmpty.push(acc)
      map[acc] = res.scrollHeight
      let pos = 0
      for (let i = 1; i < acc; i++) {
        if (map[i] !== -1) { pos++; continue }
        const a = nonEmpty[pos], b = nonEmpty[pos + 1]
        map[i] = Math.round((map[b] * (i - a) + map[a] * (b - i)) / (b - a))
      }
      return map
    }

    const syncResult = _.debounce(() => {
      if (currentView !== 'html') return
      const ta  = document.getElementById('source')
      const res = document.getElementById('result-pane')
      const lh  = parseFloat(getComputedStyle(ta).lineHeight)
      if (!scrollMap) scrollMap = buildScrollMap()
      res.scrollTo({ top: scrollMap[Math.floor(ta.scrollTop / lh)] || 0, behavior: 'auto' })
    }, 50, { maxWait: 50 })

    const syncSource = _.debounce(() => {
      if (currentView !== 'html') return
      const ta  = document.getElementById('source')
      const res = document.getElementById('result-pane')
      const lh  = parseFloat(getComputedStyle(ta).lineHeight)
      if (!scrollMap) scrollMap = buildScrollMap()
      const keys = Object.keys(scrollMap).map(Number)
      let line = 0
      for (let i = 1; i < keys.length; i++) {
        if (scrollMap[keys[i]] <= res.scrollTop) { line = keys[i]; continue }
        break
      }
      ta.scrollTo({ top: lh * line, behavior: 'auto' })
    }, 50, { maxWait: 50 })

    // ── Option checkboxes ────────────────────────────────────────────────
    const optMap = {
      'opt-html': 'html', 'opt-breaks': 'breaks', 'opt-linkify': 'linkify',
      'opt-typographer': 'typographer', 'opt-highlight': 'highlight',
      'opt-math': 'math', 'opt-strict': 'strict'
    }
    Object.entries(optMap).forEach(([id, key]) => {
      const el = document.getElementById(id)
      if (!el) return
      el.checked = opts[key]
      el.addEventListener('change', () => { opts[key] = el.checked; initMd(); render() })
    })

    // ── View toggle ──────────────────────────────────────────────────────
    function setView(v) {
      currentView = v
      const pane = document.getElementById('result-pane')
      if (v === 'html') {
        pane.className = 'result-pane html-view'
      } else {
        pane.className = 'result-pane code-view'
      }
      document.querySelectorAll('.view-btns a').forEach(a =>
        a.classList.toggle('active', a.dataset.view === v))
      render()
    }

    // ── Init ─────────────────────────────────────────────────────────────
    loadPermalink()
    initMd()

    const source = document.getElementById('source')
    const debouncedRender = _.debounce(render, 150, { maxWait: 400 })

    source.addEventListener('input',  debouncedRender)
    source.addEventListener('keyup',  debouncedRender)
    source.addEventListener('scroll', syncResult)
    document.getElementById('result-pane').addEventListener('scroll', syncSource)

    document.querySelectorAll('.view-btns a').forEach(a =>
      a.addEventListener('click', e => { e.preventDefault(); setView(a.dataset.view) }))

    document.getElementById('clear-btn').addEventListener('click', e => {
      e.preventDefault(); source.value = ''; render()
    })

    window.addEventListener('resize', () => { scrollMap = null })

    render()
  </script>
</body>
</html>
