<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paste to Markdown | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css">
    
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://unpkg.com/turndown@7.1.1/dist/turndown.js"></script>

    <style>
        #pastebin {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        #output {
            width: 100%;
            min-height: 300px;
            margin-top: 20px;
        }

        .paste-hint {
            border: 2px dashed var(--accent);
            background: var(--hover);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 20px;
        }

        .paste-hint:hover {
            opacity: 0.8;
        }

        kbd {
            background: var(--highlight);
            color: var(--text);
            padding: 2px 4px;
            border: 1px solid var(--puny);
            font-family: monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav>
      <div class="left">
        <a href="index.html">home</a> | 
        <a href="extra.html">extra</a> | 
        <a href="credits.html">credits</a> |
        <a href="changelog.html">logs</a>
      </div>
      <div class="right">
        <button id="theme-toggle">[theme]</button> |
        <a href="https://eliana.lol">site</a>
      </div>
    </nav>

    <main>
        <h1>Paste to Markdown</h1>
        <p class="puny">
            Copy formatted text (from a website or Word) then press
            <kbd>Ctrl+V</kbd> (or <kbd>⌘+V</kbd>) anywhere on this page.
        </p>

        <div id="pastebin" contenteditable="true" tabindex="-1"></div>

        <div class="paste-hint" tabindex="0">
            <div style="font-size: 24px; margin-bottom: 10px">📋</div>
            <div style="font-weight: bold;">Paste formatted text here</div>
            <div class="puny">Headings • Lists • Tables • Bold/Italic • Links</div>
        </div>

        <textarea id="output" readonly placeholder="Markdown will appear here after pasting..."></textarea>

        <div style="margin-top: 15px;">
            <button id="selectAll" style="border-color: var(--accent); font-weight: bold;">Select All & Copy</button>
            <button id="clear">Clear</button>
        </div>
    </main>

    <footer style="margin-top: 4rem; text-align: center;" class="puny">
        © 2026 eliana.lol • <a href="credits.html">credits</a>
    </footer>

    <script>
        const html = document.documentElement;
        const toggle = document.getElementById('theme-toggle');
        const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        html.setAttribute('data-theme', saved);
        if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';

        if (toggle) {
            toggle.onclick = () => {
                const now = html.getAttribute('data-theme');
                const next = now === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
            };
        }
    </script>

    <script>
        function initConverter() {
            if (typeof TurndownService === "undefined" || typeof DOMPurify === "undefined") {
                setTimeout(initConverter, 100);
                return;
            }

            const turndownService = new TurndownService({
                headingStyle: "atx",
                bulletListMarker: "-",
                codeBlockStyle: "fenced",
                emDelimiter: "*",
            });

            // Extra rules for better Markdown
            turndownService.addRule("strikethrough", {
                filter: ["del", "s", "strike"],
                replacement: (content) => "~~" + content + "~~",
            });

            const output = document.getElementById("output");
            const selectBtn = document.getElementById("selectAll");
            const clearBtn = document.getElementById("clear");

            function processHtml(htmlContent) {
                try {
                    const cleanHtml = DOMPurify.sanitize(htmlContent);
                    const markdown = turndownService.turndown(cleanHtml);
                    output.value = markdown;
                    output.style.height = "auto";
                    output.style.height = Math.max(output.scrollHeight, 300) + "px";
                } catch (error) {
                    output.value = `Error: ${error.message}`;
                }
            }

            // Global paste listener
            document.addEventListener("paste", function(e) {
                const htmlData = e.clipboardData?.getData("text/html");
                const textData = e.clipboardData?.getData("text/plain");
                if (htmlData || textData) {
                    e.preventDefault();
                    processHtml(htmlData || textData);
                }
            });

            // Click-to-paste logic for modern browsers
            document.querySelector(".paste-hint").addEventListener("click", async () => {
                try {
                    const clipboardItems = await navigator.clipboard.read();
                    for (const item of clipboardItems) {
                        if (item.types.includes("text/html")) {
                            const blob = await item.getType("text/html");
                            processHtml(await blob.text());
                            return;
                        } else if (item.types.includes("text/plain")) {
                            const blob = await item.getType("text/plain");
                            processHtml(await blob.text());
                            return;
                        }
                    }
                } catch (err) {
                    alert("Please use Ctrl+V to paste manually!");
                }
            });

            selectBtn.onclick = () => {
                output.select();
                document.execCommand("copy");
                const oldText = selectBtn.innerText;
                selectBtn.innerText = "Copied!";
                setTimeout(() => selectBtn.innerText = oldText, 1500);
            };

            clearBtn.onclick = () => {
                output.value = "";
                output.style.height = "300px";
            };
        }

        initConverter();
    </script>
</body>
</html>
