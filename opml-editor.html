<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OPML Editor | tools.eliana.lol</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" type="image/x-icon" href="favicon.svg" />
  <style>
    .container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-label {
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      color: var(--puny);
      letter-spacing: 0.05em;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    button {
      flex: 0 1 auto;
      min-width: 120px;
      padding: 10px;
      cursor: pointer;
      font-family: monospace;
      border: 1px solid var(--text);
      background: var(--bg);
      color: var(--text);
      border-radius: 4px;
      transition: all 150ms;
    }

    button:hover {
      background-color: var(--hover);
      border-color: var(--accent);
    }

    button.primary {
      border-color: var(--accent);
      font-weight: bold;
      color: var(--accent);
    }

    button.danger {
      border-style: dashed;
      opacity: 0.7;
    }

    textarea, input[type="text"] {
      width: 100%;
      font-family: monospace;
      padding: 10px;
      border: 1px solid var(--puny);
      background: var(--bg);
      color: var(--text);
      box-sizing: border-box;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea { min-height: 150px; resize: vertical; }

    .status {
      padding: 0.75rem 1rem;
      border-radius: 4px;
      margin: 0.5rem 0;
      display: none;
      font-size: 0.9rem;
    }

    .status.show { display: block; }

    .status.success {
      background-color: rgba(16, 185, 129, 0.1);
      border-left: 3px solid var(--accent);
      color: var(--accent);
    }

    .status.error {
      background-color: rgba(239, 68, 68, 0.1);
      border-left: 3px solid #ef4444;
      color: #ef4444;
    }

    .info-box {
      padding: 1rem;
      background-color: var(--highlight);
      border-left: 3px solid var(--accent);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* Feed list */
    #feed-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #feed-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border: 1px solid var(--puny);
      border-radius: 4px;
      font-size: 0.9rem;
    }

    #feed-list li:hover {
      border-color: var(--text);
      background: var(--hover);
    }

    .feed-title { flex: 1; font-weight: bold; }
    .feed-url { flex: 2; color: var(--puny); word-break: break-all; font-size: 0.8rem; }

    .feed-remove {
      min-width: unset;
      padding: 2px 8px;
      font-size: 0.8rem;
      border-style: dashed;
      opacity: 0.6;
    }

    .feed-remove:hover { opacity: 1; border-color: #ef4444; color: #ef4444; }

    .feed-move {
      min-width: unset;
      padding: 2px 6px;
      font-size: 0.8rem;
      border-color: var(--puny);
    }

    .count { color: var(--puny); font-size: 0.85rem; }

    .add-feed-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .add-feed-row input { flex: 1; min-width: 200px; }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--puny);
      margin-bottom: 1rem;
    }

    .tab {
      padding: 6px 14px;
      cursor: pointer;
      font-family: monospace;
      background: none;
      border: 1px solid transparent;
      border-bottom: none;
      color: var(--puny);
      min-width: unset;
      border-radius: 0;
      margin: 0;
    }

    .tab.active {
      border-color: var(--puny);
      border-bottom: 1px solid var(--bg);
      color: var(--text);
      margin-bottom: -1px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    #raw-view { min-height: 300px; font-size: 0.8rem; }

    @media (max-width: 600px) {
      .button-group { flex-direction: column; }
      button { width: 100%; }
      .add-feed-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="left">
      <a href="index.html">home</a> | <a href="extra.html">extra</a> |
      <a href="credits.html">credits</a> |
      <a href="changelog.html">logs</a>
    </div>
    <div class="right">
      <button id="theme-toggle">[theme]</button> |
      <a href="https://eliana.lol">site</a>
    </div>
  </nav>

  <main>
    <h1>OPML Editor</h1>
    <p class="puny">view, edit, merge, and manage your RSS/Atom feed subscription lists</p>

    <div class="container">

      <div class="button-group">
        <button class="primary" onclick="document.getElementById('file-input').click()">upload opml</button>
        <input type="file" id="file-input" accept=".opml,.xml" style="display:none" multiple />
        <button onclick="newFile()">new file</button>
        <button onclick="removeDuplicates()">remove duplicates</button>
        <button onclick="saveFile()">save file</button>
        <button class="danger" onclick="clearAll()">clear all</button>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('outliner', this)">outliner</button>
        <button class="tab" onclick="switchTab('raw', this)">raw xml</button>
      </div>

      <div id="tab-outliner" class="tab-panel active">
        <p class="count" id="feed-count">no feeds loaded</p>
        <ul id="feed-list"></ul>

        <div style="margin-top:1rem;">
          <div class="input-label" style="margin-bottom:0.5rem;">add feed by url</div>
          <div class="add-feed-row">
            <input type="text" id="new-feed-url" placeholder="https://example.com/feed.xml" />
            <button class="primary" onclick="addFeed()">add feed</button>
          </div>
        </div>
      </div>

      <div id="tab-raw" class="tab-panel">
        <textarea id="raw-view" placeholder="upload or create an OPML file to see the raw XML here..."></textarea>
        <div class="button-group" style="margin-top:0.5rem;">
          <button onclick="applyRaw()">apply changes</button>
        </div>
      </div>

      <div class="info-box">
        <strong>tip:</strong> upload multiple OPML files at once to merge them together. duplicates are detected by feed URL.
      </div>

      <div class="status" id="status"></div>
    </div>
  </main>

  <footer style="margin-top: 4rem; text-align: center" class="puny">
    © 2026 eliana.lol • <a href="credits.html">credits</a>
  </footer>

  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) {
      toggle.onclick = () => {
        const now = html.getAttribute('data-theme');
        const next = now === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
      };
    }
  </script>

  <script>
    let feeds = []; // { title, xmlUrl, type }

    function showStatus(message, type = 'success') {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status show ${type}`;
      setTimeout(() => status.classList.remove('show'), 3000);
    }

    // --- FILE HANDLING ---
    document.getElementById('file-input').addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      let loaded = 0;
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          parseOPML(ev.target.result);
          loaded++;
          if (loaded === files.length) {
            showStatus(`loaded ${files.length} file(s) — ${feeds.length} feeds total`);
            render();
          }
        };
        reader.readAsText(file);
      });
      e.target.value = '';
    });

    function parseOPML(text) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/xml');
      const outlines = doc.querySelectorAll('outline[xmlUrl]');
      outlines.forEach(o => {
        feeds.push({
          title: o.getAttribute('title') || o.getAttribute('text') || o.getAttribute('xmlUrl'),
          xmlUrl: o.getAttribute('xmlUrl'),
          type: o.getAttribute('type') || 'rss'
        });
      });
    }

    function newFile() {
      feeds = [];
      render();
      showStatus('new file created');
    }

    function clearAll() {
      if (feeds.length === 0 || confirm('clear all feeds?')) {
        feeds = [];
        render();
        showStatus('cleared');
      }
    }

    function removeDuplicates() {
      const before = feeds.length;
      const seen = new Set();
      feeds = feeds.filter(f => {
        if (seen.has(f.xmlUrl)) return false;
        seen.add(f.xmlUrl);
        return true;
      });
      const removed = before - feeds.length;
      render();
      showStatus(removed > 0 ? `removed ${removed} duplicate(s)` : 'no duplicates found');
    }

    function addFeed() {
      const input = document.getElementById('new-feed-url');
      const url = input.value.trim();
      if (!url) return;
      if (!url.startsWith('http')) {
        showStatus('please enter a valid URL', 'error'); return;
      }
      if (feeds.find(f => f.xmlUrl === url)) {
        showStatus('feed already exists', 'error'); return;
      }
      feeds.push({ title: url, xmlUrl: url, type: 'rss' });
      input.value = '';
      render();
      showStatus('feed added');
    }

    document.getElementById('new-feed-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') addFeed();
    });

    function removeFeed(idx) {
      feeds.splice(idx, 1);
      render();
    }

    function moveFeed(idx, dir) {
      const target = idx + dir;
      if (target < 0 || target >= feeds.length) return;
      [feeds[idx], feeds[target]] = [feeds[target], feeds[idx]];
      render();
    }

    // --- RENDER ---
    function render() {
      const list = document.getElementById('feed-list');
      const count = document.getElementById('feed-count');
      count.textContent = feeds.length === 0 ? 'no feeds loaded' : `${feeds.length} feed(s)`;
      list.innerHTML = '';
      feeds.forEach((f, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <button class="feed-move" onclick="moveFeed(${i}, -1)" title="move up">↑</button>
          <button class="feed-move" onclick="moveFeed(${i}, 1)" title="move down">↓</button>
          <span class="feed-title">${escHtml(f.title)}</span>
          <span class="feed-url">${escHtml(f.xmlUrl)}</span>
          <button class="feed-remove" onclick="removeFeed(${i})">✕</button>
        `;
        list.appendChild(li);
      });
      if (document.getElementById('tab-raw').classList.contains('active')) updateRawView();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // --- RAW XML ---
    function toOPML() {
      const now = new Date().toUTCString();
      const items = feeds.map(f =>
        `    <outline type="${escHtml(f.type)}" text="${escHtml(f.title)}" title="${escHtml(f.title)}" xmlUrl="${escHtml(f.xmlUrl)}"/>`
      ).join('\n');
      return `<?xml version="1.0" encoding="UTF-8"?>\n<opml version="2.0">\n  <head>\n    <title>Feed List</title>\n    <dateCreated>${now}</dateCreated>\n  </head>\n  <body>\n${items}\n  </body>\n</opml>`;
    }

    function updateRawView() {
      document.getElementById('raw-view').value = feeds.length > 0 ? toOPML() : '';
    }

    function applyRaw() {
      const raw = document.getElementById('raw-view').value;
      feeds = [];
      parseOPML(raw);
      render();
      showStatus(`parsed ${feeds.length} feed(s) from raw XML`);
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
      if (name === 'raw') updateRawView();
    }

    // --- SAVE ---
    function saveFile() {
      if (feeds.length === 0) { showStatus('nothing to save', 'error'); return; }
      const blob = new Blob([toOPML()], { type: 'text/xml' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'feeds.opml';
      a.click();
      showStatus('saved as feeds.opml');
    }

    // Pick up OPML passed from generator
    window.addEventListener('load', () => {
      const transferred = sessionStorage.getItem('opml-transfer');
      if (transferred) {
        parseOPML(transferred);
        sessionStorage.removeItem('opml-transfer');
        render();
        showStatus(`loaded ${feeds.length} feed(s) from generator`);
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.metaKey || e.ctrlKey) {
        if (e.key === 's') { e.preventDefault(); saveFile(); }
        if (e.key === 'd') { e.preventDefault(); removeDuplicates(); }
      }
    });
  </script>
</body>
</html>
