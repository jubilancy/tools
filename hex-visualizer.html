<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hex Visualizer | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="icon" type="image/x-icon" href="favicon.svg" />
    <style>
      .tool-layout {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .tiles {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
        list-style: none;
        padding: 0;
        margin-top: 20px;
        text-align: center;
      }

      .tile {
        cursor: move;
        height: 180px;
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 12px;
        border: 1px solid var(--puny);
        position: relative;
        overflow: hidden;
        transition: transform 0.2s;
      }

      .tile:hover {
        z-index: 500;
        transform: scale(1.02);
      }

      .tile-details {
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-family: monospace;
        bottom: -100%;
        left: 0;
        position: absolute;
        width: 100%;
        transition: bottom 0.2s;
      }

      .tile:hover .tile-details,
      .tile-details-visible .tile-details {
        bottom: 0;
      }

      .tile-details code {
        background: #444;
        color: var(--accent);
        padding: 2px 4px;
        border-radius: 3px;
      }

      .action-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 10px 0;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="left">
        <a href="index.html">home</a> | <a href="extra.html">extra</a> |
        <a href="credits.html">credits</a> |
        <a href="changelog.html">logs</a>
      </div>
      <div class="right">
        <button id="theme-toggle">[theme]</button> |
        <a href="https://eliana.lol">site</a>
      </div>
    </nav>

    <main>
      <h1>Hex Color Visualizer</h1>
      <p class="puny">
        Paste a list of hex codes to generate a sorted, draggable color grid.
      </p>

      <div class="tool-layout">
        <textarea
          id="textarea"
          rows="8"
          placeholder="#C8F564&#10;#0E0E0E&#10;#FF6600"
        >
#FFFF00
#000000
#C0C0C0
#F5F5F5
#039DFF
#FFFFFF
#909495
#F9FBFA
#A11360
#EEEEEE
#D9EDF7
#BCE8F1
#2A627D</textarea
        >

        <div class="action-bar">
          <button
            id="renderBtn"
            class="btn-primary"
            style="border-color: var(--accent); font-weight: bold"
          >
            ✨ Visualise
          </button>
          <button
            id="clearBtn"
            style="color: var(--accent); border-style: dashed"
          >
            Clear All
          </button>
        </div>

        <ul class="tiles"></ul>
      </div>
    </main>

    <footer style="margin-top: 4rem; text-align: center" class="puny">
      © 2026 eliana.lol • <a href="credits.html">credits</a>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>

    <script>
      // Site Theme Logic
      const html = document.documentElement;
      const toggle = document.getElementById('theme-toggle');
      const saved =
        localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light');
      html.setAttribute('data-theme', saved);
      if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';

      if (toggle) {
        toggle.onclick = () => {
          const now = html.getAttribute('data-theme');
          const next = now === 'dark' ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
        };
      }

      // Color Tool Logic
      ('use strict');
      (function startSorting() {
        $('#renderBtn').on('click', function (e) {
          e.preventDefault();
          var $tilesContainer = $('.tiles'),
            $toggleDetails = $(
              '<button id="toggleDetails" style="margin-left: 10px;">Toggle details</button>'
            ),
            $lines = $('#textarea').val().split(/\n/),
            unsortedArrayOfColorObjects = [];

          for (var i = 0; i < $lines.length; i++) {
            var val = $.trim($lines[i]);
            if (val) {
              var formattedHex = val.startsWith('#') ? val : '#' + val;
              unsortedArrayOfColorObjects.push({ hex: formattedHex });
            }
          }

          var sortedArrayOfColorObjects = sortColors(
            unsortedArrayOfColorObjects
          );
          $tilesContainer.empty();

          $.each(sortedArrayOfColorObjects, function (index, value) {
            var rgb = hexToRgb(value.hex);
            var tile =
              '<li class="tile" style="background-color:' +
              value.hex +
              ';">' +
              '<div class="tile-details">' +
              '<p>Hex: <code>' +
              value.hex.toUpperCase() +
              '</code></p>' +
              '<p>RGB: <code>' +
              rgb.r +
              ' ' +
              rgb.g +
              ' ' +
              rgb.b +
              '</code></p>' +
              '</div></li>';
            $tilesContainer.append(tile);
          });

          $tilesContainer.sortable().disableSelection();

          if ($('#toggleDetails').length === 0) $(this).after($toggleDetails);

          $toggleDetails.off('click').on('click', function (e) {
            e.preventDefault();
            $tilesContainer.toggleClass('tile-details-visible');
          });
        });

        $('#clearBtn').on('click', function () {
          $('#textarea').val('');
          $('.tiles').empty();
          $('#toggleDetails').remove();
        });
      })();

      function sortColors(colors) {
        for (var c = 0; c < colors.length; c++) {
          var hex = colors[c].hex.replace('#', '');
          if (hex.length === 3)
            hex = hex
              .split('')
              .map((x) => x + x)
              .join('');
          var r = parseInt(hex.substring(0, 2), 16) / 255;
          var g = parseInt(hex.substring(2, 4), 16) / 255;
          var b = parseInt(hex.substring(4, 6), 16) / 255;
          var max = Math.max(r, g, b),
            min = Math.min(r, g, b);
          var chr = max - min,
            hue = 0;
          if (chr !== 0) {
            if (r == max) hue = ((g - b) / chr) % 6;
            else if (g == max) hue = (b - r) / chr + 2;
            else hue = (r - g) / chr + 4;
            hue *= 60;
            if (hue < 0) hue += 360;
          }
          colors[c].hue = hue;
        }
        return colors.sort((a, b) => a.hue - b.hue);
      }

      function hexToRgb(hex) {
        var c = hex.replace('#', '');
        if (c.length === 3) c = c[0] + c[0] + c[1] + c[1] + c[2] + c[2];
        var res = /^([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(c);
        return res
          ? {
              r: parseInt(res[1], 16),
              g: parseInt(res[2], 16),
              b: parseInt(res[3], 16),
            }
          : { r: 0, g: 0, b: 0 };
      }
    </script>
  </body>
</html>
