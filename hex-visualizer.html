<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Hex Visualiser | tools.eliana.lol</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; list-style: none; padding: 0; margin-top: 20px; }
        .tile { height: 150px; border-radius: 4px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; font-size: 0.7rem; border: 1px solid var(--puny); }
        .tile-details { background: rgba(0,0,0,0.5); color: white; padding: 5px; border-radius: 2px; }
    </style>
</head>
<body>
    <nav>
        <div class="left"><a href="index.html">home</a> | <a href="extra.html">extra</a> | <a href="credits.html">credits</a> | <a href="changelog.html">logs</a></div>
        <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
    </nav>
    <main>
        <h1>Hex Color Visualiser</h1>
        <textarea id="textarea" rows="6" style="margin: 20px 0;">#C8F564\n#FF6600</textarea>
        <button onclick="renderTiles()" style="border-color: var(--accent);">Visualise</button>
        <ul class="tiles" id="tilesContainer"></ul>
    </main>
    <script>
        const html = document.documentElement;
        function renderTiles() {
            const container = document.getElementById('tilesContainer'); container.innerHTML = '';
            document.getElementById('textarea').value.split('\n').forEach(color => {
                const hex = color.trim(); if(!hex) return;
                const li = document.createElement('li'); li.className = 'tile';
                li.style.backgroundColor = hex;
                li.innerHTML = `<div class="tile-details"><code>${hex}</code></div>`;
                container.appendChild(li);
            });
        }
    </script>
</body>
</html>
