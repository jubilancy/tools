<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browser Synth | tools.eliana.lol</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" type="image/x-icon" href="favicon.svg" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.0.4/Tone.js"></script>
  <style>
    .container { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Piano keyboard */
    .keyboard {
      display: flex;
      position: relative;
      height: 140px;
      user-select: none;
      border: 1px solid var(--puny);
      overflow: hidden;
    }

    .key {
      position: relative;
      flex: 1;
      border-right: 1px solid var(--puny);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
      font-size: 0.65rem;
      color: var(--puny);
      transition: background 80ms;
    }

    .key:last-child { border-right: none; }
    .key.active, .key:active { background: var(--accent) !important; color: white; }

    .key.black {
      position: absolute;
      background: var(--text);
      color: var(--bg);
      width: 7%;
      height: 60%;
      top: 0;
      z-index: 2;
      font-size: 0.55rem;
      padding-bottom: 4px;
    }

    .key.black.active, .key.black:active { background: var(--accent) !important; }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .input-label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: var(--puny); }
    input[type="range"] { width: 100%; padding: 0; }

    select {
      font-family: monospace;
      padding: 6px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--puny);
      width: 100%;
    }

    .seq-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
    }

    .seq-btn {
      aspect-ratio: 1;
      border: 1px solid var(--puny);
      background: var(--bg);
      cursor: pointer;
      padding: 0;
      font-size: 0.7rem;
      font-family: monospace;
      min-width: 0;
      color: var(--puny);
    }

    .seq-btn.on { background: var(--accent); border-color: var(--accent); color: white; }
    .seq-btn.playing { outline: 2px solid var(--text); }

    .note-labels {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
      margin-bottom: 2px;
    }

    .note-label { font-size: 0.65rem; color: var(--puny); text-align: center; font-family: monospace; }

    .row-label { font-size: 0.75rem; color: var(--puny); margin-bottom: 4px; }

    button {
      padding: 8px 14px;
      font-family: monospace;
      border: 1px solid var(--text);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    button:hover { background-color: var(--hover); border-color: var(--accent); }
    button.primary { border-color: var(--accent); color: var(--accent); font-weight: bold; }
    button.danger { border-style: dashed; opacity: 0.7; }

    .status { padding: 0.75rem 1rem; margin: 0.5rem 0; display: none; font-size: 0.9rem; border-left: 3px solid var(--accent); background: rgba(255,102,0,0.08); color: var(--accent); }
    .status.show { display: block; }

    .bpm-display { font-size: 1.5rem; font-weight: bold; }
    .section-label { font-weight: bold; font-size: 0.85rem; text-transform: uppercase; border-bottom: 1px solid var(--puny); padding-bottom: 4px; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <nav>
    <div class="left">
      <a href="index.html">home</a> | <a href="extra.html">extra</a> |
      <a href="credits.html">credits</a> |
      <a href="changelog.html">logs</a>
    </div>
    <div class="right">
      <button id="theme-toggle">[theme]</button> |
      <a href="https://eliana.lol">site</a>
    </div>
  </nav>

  <main>
    <h1>Browser Synth</h1>
    <p class="puny">play notes with your keyboard, or build a sequence. powered by tone.js.</p>

    <div class="container">
      <div>
        <div class="section-label">Play</div>
        <div class="keyboard" id="keyboard"></div>
        <p class="puny" style="margin-top:0.5rem;">keyboard: a s d f g h j k l — or click the keys above</p>
      </div>

      <div class="controls">
        <div class="control-group">
          <label class="input-label">Oscillator</label>
          <select id="oscType" onchange="updateSynth()">
            <option value="sine">sine</option>
            <option value="triangle">triangle</option>
            <option value="square">square</option>
            <option value="sawtooth" selected>sawtooth</option>
          </select>
        </div>
        <div class="control-group">
          <label class="input-label">Attack <span id="att-val">0.01</span>s</label>
          <input type="range" id="attack" min="0.001" max="2" step="0.001" value="0.01" oninput="document.getElementById('att-val').textContent=parseFloat(this.value).toFixed(3);updateSynth()">
        </div>
        <div class="control-group">
          <label class="input-label">Release <span id="rel-val">0.5</span>s</label>
          <input type="range" id="release" min="0.01" max="4" step="0.01" value="0.5" oninput="document.getElementById('rel-val').textContent=parseFloat(this.value).toFixed(2);updateSynth()">
        </div>
        <div class="control-group">
          <label class="input-label">Reverb <span id="rev-val">0.3</span></label>
          <input type="range" id="reverb" min="0" max="1" step="0.01" value="0.3" oninput="document.getElementById('rev-val').textContent=this.value;updateSynth()">
        </div>
        <div class="control-group">
          <label class="input-label">Volume <span id="vol-val">-6</span>dB</label>
          <input type="range" id="volume" min="-30" max="0" step="1" value="-6" oninput="document.getElementById('vol-val').textContent=this.value;updateSynth()">
        </div>
        <div class="control-group">
          <label class="input-label">BPM <span id="bpm-val">120</span></label>
          <input type="range" id="bpm" min="60" max="200" step="1" value="120" oninput="document.getElementById('bpm-val').textContent=this.value;Tone.getTransport().bpm.value=this.value">
        </div>
      </div>

      <div>
        <div class="section-label">Sequencer</div>
        <div class="note-labels" id="note-labels"></div>
        <div id="seq-rows"></div>
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1rem;">
          <button class="primary" onclick="toggleSeq()" id="seq-btn">▶ start</button>
          <button onclick="clearSeq()" class="danger">clear</button>
          <button onclick="randomSeq()">randomize</button>
        </div>
      </div>

      <div class="status" id="status"></div>
    </div>
  </main>

  <footer style="margin-top: 4rem; text-align: center" class="puny">
    © 2026 eliana.lol • <a href="credits.html">credits</a>
  </footer>

  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) {
      toggle.onclick = () => {
        const now = html.getAttribute('data-theme');
        const next = now === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        toggle.innerText = next === 'dark' ? '[light]' : '[dark]';
      };
    }
  </script>

  <script>
    // --- Synth Setup ---
    let reverb = new Tone.Reverb({ decay: 2, wet: 0.3 }).toDestination();
    let synth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: 'sawtooth' },
      envelope: { attack: 0.01, decay: 0.1, sustain: 0.5, release: 0.5 },
      volume: -6
    }).connect(reverb);

    function updateSynth() {
      synth.set({
        oscillator: { type: document.getElementById('oscType').value },
        envelope: {
          attack: parseFloat(document.getElementById('attack').value),
          release: parseFloat(document.getElementById('release').value)
        },
        volume: parseInt(document.getElementById('volume').value)
      });
      reverb.wet.value = parseFloat(document.getElementById('reverb').value);
    }

    // --- Piano Keyboard ---
    const octaveNotes = ['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5','G5','A5','B5'];
    const blackPositions = { 'C#4': 1, 'D#4': 2, 'F#4': 4, 'G#4': 5, 'A#4': 6, 'C#5': 8, 'D#5': 9, 'F#5': 11, 'G#5': 12, 'A#5': 13 };
    const keyMap = { a:'C4', w:'C#4', s:'D4', e:'D#4', d:'E4', f:'F4', t:'F#4', g:'G4', y:'G#4', h:'A4', u:'A#4', j:'B4', k:'C5', l:'D5' };

    const kb = document.getElementById('keyboard');
    octaveNotes.forEach((note, i) => {
      const key = document.createElement('div');
      key.className = 'key';
      key.dataset.note = note;
      key.textContent = note.replace(/\d/, '');
      key.addEventListener('mousedown', () => playNote(note, key));
      key.addEventListener('mouseup', () => releaseNote(note, key));
      key.addEventListener('mouseleave', () => releaseNote(note, key));
      kb.appendChild(key);
    });
    Object.entries(blackPositions).forEach(([note, pos]) => {
      const whiteKeys = kb.querySelectorAll('.key:not(.black)');
      if (whiteKeys[pos - 1]) {
        const ref = whiteKeys[pos - 1].getBoundingClientRect();
        const key = document.createElement('div');
        key.className = 'key black';
        key.dataset.note = note;
        key.style.left = `calc(${(pos - 0.5) / octaveNotes.length * 100}% - 3.5%)`;
        key.textContent = note.slice(0, -1);
        key.addEventListener('mousedown', () => playNote(note, key));
        key.addEventListener('mouseup', () => releaseNote(note, key));
        key.addEventListener('mouseleave', () => releaseNote(note, key));
        kb.appendChild(key);
      }
    });

    async function playNote(note, el) {
      await Tone.start();
      synth.triggerAttack(note);
      el?.classList.add('active');
    }
    function releaseNote(note, el) {
      synth.triggerRelease(note);
      el?.classList.remove('active');
    }

    document.addEventListener('keydown', async e => {
      if (e.repeat) return;
      const note = keyMap[e.key.toLowerCase()];
      if (!note) return;
      const key = kb.querySelector(`[data-note="${note}"]`);
      await playNote(note, key);
    });
    document.addEventListener('keyup', e => {
      const note = keyMap[e.key.toLowerCase()];
      if (!note) return;
      const key = kb.querySelector(`[data-note="${note}"]`);
      releaseNote(note, key);
    });

    // --- Sequencer ---
    const SEQ_NOTES = ['C5','B4','A4','G4','F4','E4','D4','C4'];
    const SEQ_STEPS = 8;
    let seqState = Array.from({ length: SEQ_NOTES.length }, () => new Array(SEQ_STEPS).fill(false));
    let seqPlaying = false;
    let seqIndex = 0;
    let seqLoop = null;
    let seqBtns = [];

    const noteLabels = document.getElementById('note-labels');
    for (let s = 0; s < SEQ_STEPS; s++) {
      const l = document.createElement('div');
      l.className = 'note-label';
      l.textContent = s + 1;
      noteLabels.appendChild(l);
    }

    const seqRows = document.getElementById('seq-rows');
    SEQ_NOTES.forEach((note, row) => {
      const wrap = document.createElement('div');
      wrap.style.marginBottom = '4px';
      const rowLabel = document.createElement('div');
      rowLabel.className = 'row-label';
      rowLabel.textContent = note;
      const grid = document.createElement('div');
      grid.className = 'seq-grid';
      const rowBtns = [];
      for (let s = 0; s < SEQ_STEPS; s++) {
        const btn = document.createElement('button');
        btn.className = 'seq-btn';
        btn.onclick = () => { seqState[row][s] = !seqState[row][s]; btn.classList.toggle('on', seqState[row][s]); };
        grid.appendChild(btn);
        rowBtns.push(btn);
      }
      seqBtns.push(rowBtns);
      wrap.appendChild(rowLabel);
      wrap.appendChild(grid);
      seqRows.appendChild(wrap);
    });

    async function toggleSeq() {
      await Tone.start();
      if (seqPlaying) {
        Tone.getTransport().stop();
        Tone.getTransport().cancel();
        seqPlaying = false;
        document.getElementById('seq-btn').textContent = '▶ start';
        seqBtns.forEach(row => row.forEach(b => b.classList.remove('playing')));
      } else {
        seqIndex = 0;
        Tone.getTransport().bpm.value = parseInt(document.getElementById('bpm').value);
        Tone.getTransport().scheduleRepeat(time => {
          const step = seqIndex % SEQ_STEPS;
          seqBtns.forEach(row => row.forEach((b, s) => b.classList.toggle('playing', s === step)));
          SEQ_NOTES.forEach((note, row) => {
            if (seqState[row][step]) synth.triggerAttackRelease(note, '8n', time);
          });
          seqIndex++;
        }, '8n');
        Tone.getTransport().start();
        seqPlaying = true;
        document.getElementById('seq-btn').textContent = '■ stop';
      }
    }

    function clearSeq() {
      seqState = Array.from({ length: SEQ_NOTES.length }, () => new Array(SEQ_STEPS).fill(false));
      seqBtns.forEach(row => row.forEach(b => { b.classList.remove('on'); b.classList.remove('playing'); }));
    }

    function randomSeq() {
      SEQ_NOTES.forEach((_, row) => {
        for (let s = 0; s < SEQ_STEPS; s++) {
          seqState[row][s] = Math.random() > 0.75;
          seqBtns[row][s].classList.toggle('on', seqState[row][s]);
        }
      });
    }
  </script>
</body>
</html>
