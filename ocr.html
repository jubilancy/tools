<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OCR | tools.eliana.lol</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="icon" type="image/x-icon" href="../favicon.svg" />
  <style>
    .tool-layout { display: flex; flex-direction: column; gap: 20px; }
    .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--puny); margin-bottom: 5px; }
    #drop-zone { border: 2px dashed var(--puny); padding: 40px; text-align: center; cursor: pointer; color: var(--puny); }
    #drop-zone.over { border-color: var(--accent); color: var(--text); }
    #preview-img { max-width: 100%; max-height: 300px; border: 1px solid var(--puny); display: none; margin-top: 10px; }
    #progress-bar-wrap { border: 1px solid var(--puny); height: 6px; margin: 8px 0; display: none; }
    #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s; }
    #status { font-size: 0.8rem; color: var(--puny); min-height: 1.2rem; }
    #result-text { min-height: 100px; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--puny); font-family: monospace; padding: 4px 8px; }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="../index.html">home</a> | <a href="../extra.html">extra</a> | <a href="../credits.html">credits</a> | <a href="../changelog.html">logs</a></div>
    <div class="right"><button id="theme-toggle">[theme]</button> | <a href="https://eliana.lol">site</a></div>
  </nav>
  <main>
    <h1>OCR — Text Recognition</h1>
    <p class="puny">Extract text from images in the browser using Tesseract.js. No files leave your device.</p>
    <div class="tool-layout">
      <div>
        <div id="drop-zone" onclick="document.getElementById('img-input').click()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
          Drop an image here or click to browse
        </div>
        <input type="file" id="img-input" accept="image/*" style="display:none" onchange="loadFile(this.files[0])" />
        <img id="preview-img" alt="Preview" />
      </div>
      <div>
        <label>Language</label>
        <select id="lang">
          <option value="eng">English</option>
          <option value="fra">French</option>
          <option value="deu">German</option>
          <option value="spa">Spanish</option>
          <option value="jpn">Japanese</option>
          <option value="chi_sim">Chinese (Simplified)</option>
        </select>
      </div>
      <div class="action-bar">
        <button onclick="runOCR()" id="ocr-btn" disabled>Extract text</button>
      </div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
      <div id="status">Load an image to begin.</div>
      <div>
        <label>Extracted text</label>
        <textarea id="result-text" rows="10" readonly placeholder="Text will appear here…"></textarea>
      </div>
      <div class="action-bar">
        <button onclick="copyText()">Copy text</button>
        <button onclick="downloadText()">Download .txt</button>
      </div>
    </div>
  </main>
  <footer style="margin-top: 4rem; text-align: center" class="puny">© 2026 eliana.lol • <a href="../credits.html">credits</a></footer>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const htmlEl = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', saved);
    if (toggle) toggle.innerText = saved === 'dark' ? '[light]' : '[dark]';
    if (toggle) toggle.onclick = () => { const now = htmlEl.getAttribute('data-theme'); const next = now === 'dark' ? 'light' : 'dark'; htmlEl.setAttribute('data-theme', next); localStorage.setItem('theme', next); toggle.innerText = next === 'dark' ? '[light]' : '[dark]'; };

    let currentFile = null;

    function dragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); }
    function dragLeave() { document.getElementById('drop-zone').classList.remove('over'); }
    function dropFile(e) { e.preventDefault(); dragLeave(); loadFile(e.dataTransfer.files[0]); }

    function loadFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      currentFile = file;
      const img = document.getElementById('preview-img');
      img.src = URL.createObjectURL(file);
      img.style.display = 'block';
      document.getElementById('ocr-btn').disabled = false;
      document.getElementById('status').textContent = 'Image loaded. Click "Extract text" to run OCR.';
    }

    async function runOCR() {
      if (!currentFile) return;
      const lang = document.getElementById('lang').value;
      document.getElementById('progress-bar-wrap').style.display = 'block';
      document.getElementById('ocr-btn').disabled = true;
      document.getElementById('status').textContent = 'Initialising…';
      try {
        const worker = await Tesseract.createWorker(lang, 1, {
          logger: m => {
            document.getElementById('status').textContent = m.status + (m.progress ? ` (${Math.round(m.progress*100)}%)` : '');
            document.getElementById('progress-bar').style.width = (m.progress * 100) + '%';
          }
        });
        const { data: { text } } = await worker.recognize(currentFile);
        document.getElementById('result-text').value = text;
        document.getElementById('status').textContent = 'Done.';
        document.getElementById('progress-bar').style.width = '100%';
        await worker.terminate();
      } catch(e) {
        document.getElementById('status').textContent = 'Error: ' + e.message;
      }
      document.getElementById('ocr-btn').disabled = false;
    }

    function copyText() { navigator.clipboard.writeText(document.getElementById('result-text').value); }
    function downloadText() {
      const text = document.getElementById('result-text').value;
      if (!text) return;
      const a = document.createElement('a');
      a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
      a.download = 'ocr-result.txt';
      a.click();
    }
  </script>
</body>
</html>
